  .sl { font-size:8px; color:rgba(220,235,255,0.16); letter-spacing:2px; text-transform:uppercase; margin-top:3px; text-align:center; }

// ─── DEFINIÇÃO DOS LOBOS ───────────────────────────────────────────────────────

const LOBES_RIGHT_DEF = [

  {

const CROSS_IDS = [
  ['frontal','frontal_r'],['frontal','parietal_r'],
  ['parietal','parietal_r'],['temporal','temporal_r'],
  ['occipital','occipital_r'],['cerebellum','cerebellum_r'],
  ['brainstem','brainstem_r'],['frontal','cerebellum_r'],
  ['temporal','frontal_r'],
];

// ─── ESTADO ───────────────────────────────────────────────────────────────────
let nodes = [], connections = [], sparks = [];
let hoveredLobe = null;
let sCnt = 0, sPerSec = 0, lastSec = Date.now();

// ─── GEOMETRIA DOS CÉREBROS ───────────────────────────────────────────────────
function getBrainLayout() {
  // Cada cérebro tem um bounding box
  const bH = Math.min(H * 0.72, W * 0.38);
  const bW = bH * 0.88; // proporção do cérebro em perfil
  const gap = W * 0.03;
  const totalW = bW * 2 + gap;
  const startX = (W - totalW) / 2;
  const startY = (H - bH) / 2 + H * 0.02;

  return {
    left:  { x: startX,          y: startY, w: bW, h: bH },
    right: { x: startX + bW + gap, y: startY, w: bW, h: bH },
  };
}

// ─── DESENHO DO CÉREBRO (SVG-like com Canvas) ─────────────────────────────────
// Baseado na forma real do corte sagital medial da foto de referência:
// - Córtex grande e arredondado no topo
// - Giros e sulcos bem marcados
// - Cerebelo na parte posterior inferior com estrutura em árvore
// - Corpo caloso interno
// - Tronco encefálico saindo para baixo

function drawBrainShape(bx, by, bw, bh, flip) {
  const cx = bx + bw / 2;
  const cy = by + bh / 2;
  const f = flip ? -1 : 1; // espelha horizontalmente
  // Ponto de referência: (cx, cy) = centro do bounding box
  // Escala: bw e bh

  function p(nx, ny) {
    // nx, ny em [0..1] relativo ao bounding box, com flip
    const rx = flip ? (1 - nx) : nx;
    return [bx + rx * bw, by + ny * bh];
  }

  // ─── SILHUETA PRINCIPAL DO CÓRTEX ─────────────────────────────────────────
  // Forma real: arco superior grande, face frontal quase vertical,
  // occipital arredondado, base com cerebelo e tronco
  bgX.save();
  bgX.beginPath();

  // Topo frontal (esquerda = anterior)
  const [x0,y0] = p(0.18, 0.08);
  bgX.moveTo(x0, y0);

  // Arco superior do córtex (muito arredondado)
  const [x1,y1] = p(0.38, 0.02); const [x2,y2] = p(0.58, 0.01); const [x3,y3] = p(0.78, 0.05);
  bgX.bezierCurveTo(x1,y1, x2,y2, x3,y3);

  // Occipital (posterior superior)
  const [x4,y4] = p(0.92, 0.15); const [x5,y5] = p(0.96, 0.30); const [x6,y6] = p(0.94, 0.45);
  bgX.bezierCurveTo(x4,y4, x5,y5, x6,y6);

  // Occipital inferior / junção com cerebelo
  const [x7,y7] = p(0.90, 0.55); const [x8,y8] = p(0.84, 0.60); const [x9,y9] = p(0.78, 0.62);
  bgX.bezierCurveTo(x7,y7, x8,y8, x9,y9);

  // Cerebelo (posterior inferior) — protuberância característica
  const [xa,ya] = p(0.82, 0.70); const [xb,yb] = p(0.80, 0.82); const [xc,yc] = p(0.72, 0.88);
  bgX.bezierCurveTo(xa,ya, xb,yb, xc,yc);
  const [xd,yd] = p(0.62, 0.93); const [xe,ye] = p(0.52, 0.94); const [xf,yf] = p(0.44, 0.90);
  bgX.bezierCurveTo(xd,yd, xe,ye, xf,yf);

  // Tronco encefálico (inferior central)
  const [xg,yg] = p(0.38, 0.86); const [xh,yh] = p(0.34, 0.92); const [xi,yi] = p(0.36, 0.98);
  bgX.bezierCurveTo(xg,yg, xh,yh, xi,yi);
  const [xj,yj] = p(0.42, 1.00); const [xk,yk] = p(0.30, 1.00); const [xl,yl] = p(0.26, 0.95);
  bgX.bezierCurveTo(xj,yj, xk,yk, xl,yl);

  // Lobo temporal inferior (anterior inferior)
  const [xm,ym] = p(0.22, 0.88); const [xn,yn] = p(0.14, 0.78); const [xo,yo] = p(0.10, 0.68);
  bgX.bezierCurveTo(xm,ym, xn,yn, xo,yo);

  // Face frontal (anterior)
  const [xp2,yp2] = p(0.08, 0.55); const [xq,yq] = p(0.06, 0.42); const [xr,yr] = p(0.08, 0.28);
  bgX.bezierCurveTo(xp2,yp2, xq,yq, xr,yr);
  const [xs,ys] = p(0.10, 0.18); const [xt,yt] = p(0.14, 0.12); bgX.bezierCurveTo(xs,ys, xt,yt, x0,y0);

  bgX.closePath();

  // Glow interno
  const grad = bgX.createRadialGradient(bx+bw*0.45, by+bh*0.38, bh*0.05, bx+bw*0.45, by+bh*0.38, bh*0.62);
  grad.addColorStop(0, 'rgba(200,218,255,0.028)');
  grad.addColorStop(0.5, 'rgba(200,218,255,0.012)');
  grad.addColorStop(1, 'transparent');
  bgX.fillStyle = grad; bgX.fill();
  bgX.strokeStyle = 'rgba(200,218,255,0.18)'; bgX.lineWidth = 1.4; bgX.stroke();
  bgX.restore();

  // ─── GIROS E SULCOS DO CÓRTEX ──────────────────────────────────────────────
  // Sulcos principais baseados na anatomia real
  const sulcos = [
    // Sulco central (Rolando) — divide frontal e parietal
    [p(0.50,0.04), p(0.46,0.18), p(0.42,0.35), p(0.38,0.52)],
    // Sulco lateral (Sylvius) — divide temporal dos demais
    [p(0.18,0.52), p(0.30,0.48), p(0.46,0.46), p(0.62,0.48)],
    // Sulco parieto-occipital
    [p(0.72,0.08), p(0.76,0.22), p(0.78,0.38), p(0.76,0.52)],
    // Sulco cingulado (interno superior)
    [p(0.22,0.22), p(0.38,0.18), p(0.56,0.18), p(0.72,0.22)],
    // Giro frontal superior
    [p(0.14,0.14), p(0.26,0.10), p(0.38,0.10), p(0.48,0.12)],
    // Giro frontal médio
    [p(0.12,0.28), p(0.22,0.24), p(0.34,0.24), p(0.44,0.28)],
    // Giro frontal inferior
    [p(0.10,0.42), p(0.20,0.38), p(0.32,0.38), p(0.42,0.42)],
    // Giro pré-central
    [p(0.44,0.08), p(0.46,0.22), p(0.44,0.38)],
    // Giro pós-central
    [p(0.52,0.08), p(0.54,0.22), p(0.52,0.38)],
    // Giro parietal superior
    [p(0.56,0.10), p(0.64,0.12), p(0.72,0.16)],
    // Giro parietal inferior
    [p(0.54,0.26), p(0.62,0.28), p(0.70,0.32)],
    // Giro angular / supramarginal
    [p(0.60,0.38), p(0.68,0.40), p(0.74,0.44)],
    // Giro temporal superior
    [p(0.20,0.56), p(0.34,0.54), p(0.50,0.54), p(0.62,0.56)],
    // Giro temporal médio
    [p(0.18,0.64), p(0.30,0.62), p(0.44,0.62), p(0.56,0.64)],
    // Giro temporal inferior
    [p(0.16,0.72), p(0.26,0.70), p(0.38,0.70)],
    // Giro occipital
    [p(0.78,0.56), p(0.82,0.44), p(0.86,0.34)],
    [p(0.80,0.62), p(0.86,0.54), p(0.90,0.44)],
  ];

  bgX.save();
  sulcos.forEach(pts => {
    bgX.beginPath();
    bgX.moveTo(pts[0][0], pts[0][1]);
    if (pts.length === 4) {
      bgX.bezierCurveTo(pts[1][0],pts[1][1], pts[2][0],pts[2][1], pts[3][0],pts[3][1]);
    } else {
      bgX.quadraticCurveTo(pts[1][0],pts[1][1], pts[2][0],pts[2][1]);
    }
    bgX.strokeStyle = 'rgba(200,218,255,0.07)'; bgX.lineWidth = 0.8; bgX.stroke();
  });
  bgX.restore();

  // ─── CEREBELO — ARBOR VITAE (estrutura em árvore) ─────────────────────────
  bgX.save();
  // Contorno do cerebelo
  bgX.beginPath();
  const [ce1x,ce1y] = p(0.46, 0.64);
  bgX.moveTo(ce1x, ce1y);
  const [ce2x,ce2y] = p(0.60, 0.62); const [ce3x,ce3y] = p(0.74, 0.66); const [ce4x,ce4y] = p(0.80, 0.74);
  bgX.bezierCurveTo(ce2x,ce2y, ce3x,ce3y, ce4x,ce4y);
  const [ce5x,ce5y] = p(0.82, 0.82); const [ce6x,ce6y] = p(0.76, 0.90); const [ce7x,ce7y] = p(0.66, 0.92);
  bgX.bezierCurveTo(ce5x,ce5y, ce6x,ce6y, ce7x,ce7y);
  const [ce8x,ce8y] = p(0.54, 0.93); const [ce9x,ce9y] = p(0.44, 0.90); const [ce10x,ce10y] = p(0.40, 0.84);
  bgX.bezierCurveTo(ce8x,ce8y, ce9x,ce9y, ce10x,ce10y);
  const [ce11x,ce11y] = p(0.38, 0.76); const [ce12x,ce12y] = p(0.40, 0.68); bgX.bezierCurveTo(ce11x,ce11y, ce12x,ce12y, ce1x,ce1y);
  bgX.closePath();
  bgX.strokeStyle = 'rgba(200,218,255,0.12)'; bgX.lineWidth = 1.0; bgX.stroke();

  // Lamelas do cerebelo (arbor vitae — padrão em galhos)
  const cerebelumLines = [
    // Linha central
    [p(0.60,0.66), p(0.62,0.72), p(0.62,0.80), p(0.60,0.88)],
    // Galhos superiores direitos
    [p(0.62,0.68), p(0.68,0.66), p(0.74,0.68)],
    [p(0.62,0.72), p(0.70,0.70), p(0.76,0.72)],
    [p(0.62,0.76), p(0.70,0.74), p(0.76,0.76)],
    [p(0.62,0.80), p(0.68,0.78), p(0.74,0.80)],
    [p(0.62,0.84), p(0.66,0.82), p(0.70,0.84)],
    // Galhos superiores esquerdos
    [p(0.62,0.68), p(0.56,0.66), p(0.50,0.68)],
    [p(0.62,0.72), p(0.54,0.70), p(0.48,0.72)],
    [p(0.62,0.76), p(0.54,0.74), p(0.48,0.76)],
    [p(0.62,0.80), p(0.56,0.78), p(0.50,0.80)],
    [p(0.62,0.84), p(0.56,0.82), p(0.52,0.84)],
  ];
  cerebelumLines.forEach(pts => {
    bgX.beginPath(); bgX.moveTo(pts[0][0], pts[0][1]);
    if (pts.length === 4) bgX.bezierCurveTo(pts[1][0],pts[1][1], pts[2][0],pts[2][1], pts[3][0],pts[3][1]);
    else bgX.quadraticCurveTo(pts[1][0],pts[1][1], pts[2][0],pts[2][1]);
    bgX.strokeStyle = 'rgba(200,218,255,0.09)'; bgX.lineWidth = 0.6; bgX.stroke();
  });
  bgX.restore();

  // ─── CORPO CALOSO (interno — sutil) ─────────────────────────────────────────
  bgX.save();
  bgX.beginPath();
  // Apenas uma linha curva sutil representando o corpo caloso
  bgX.moveTo(...p(0.26, 0.44));
  bgX.bezierCurveTo(...p(0.36, 0.40), ...p(0.52, 0.40), ...p(0.64, 0.44));
  bgX.strokeStyle = 'rgba(200,218,255,0.09)'; bgX.lineWidth = 1.2; bgX.stroke();
  // Joelho do corpo caloso (genu)
  bgX.beginPath();
  bgX.moveTo(...p(0.26, 0.44));
  bgX.bezierCurveTo(...p(0.22, 0.40), ...p(0.22, 0.36), ...p(0.26, 0.34));
  bgX.strokeStyle = 'rgba(200,218,255,0.07)'; bgX.lineWidth = 1.0; bgX.stroke();
  // Esplênio (posterior)
  bgX.beginPath();
  bgX.moveTo(...p(0.64, 0.44));
  bgX.bezierCurveTo(...p(0.68, 0.40), ...p(0.68, 0.36), ...p(0.64, 0.34));
  bgX.strokeStyle = 'rgba(200,218,255,0.07)'; bgX.lineWidth = 1.0; bgX.stroke();
  bgX.restore();

  // ─── TRONCO ENCEFÁLICO ────────────────────────────────────────────────────
  bgX.save();
  bgX.beginPath();
  const [tr1x,tr1y] = p(0.30, 0.58);
  bgX.moveTo(tr1x, tr1y);
  bgX.bezierCurveTo(...p(0.28,0.68), ...p(0.28,0.78), ...p(0.30,0.88));
  bgX.bezierCurveTo(...p(0.32,0.94), ...p(0.36,0.98), ...p(0.40,0.98));
  bgX.bezierCurveTo(...p(0.44,0.98), ...p(0.46,0.94), ...p(0.46,0.88));
  bgX.bezierCurveTo(...p(0.46,0.78), ...p(0.44,0.68), ...p(0.42,0.58));
  bgX.closePath();
  bgX.strokeStyle = 'rgba(200,218,255,0.10)'; bgX.lineWidth = 0.9;
  bgX.fillStyle = 'rgba(200,218,255,0.012)'; bgX.fill(); bgX.stroke();
  bgX.restore();

  // ─── LABELS ANATÔMICOS ────────────────────────────────────────────────────
  bgX.save();
  bgX.font = '7px Courier New';
  bgX.fillStyle = 'rgba(200,218,255,0.20)';
  bgX.textAlign = 'center';
  const labels = [
    { t:'LOBO FRONTAL',   nx:0.26, ny:0.22 },
    { t:'LOBO PARIETAL',  nx:0.62, ny:0.18 },
    { t:'LOBO TEMPORAL',  nx:0.38, ny:0.72 },
    { t:'LOBO OCCIPITAL', nx:0.84, ny:0.30 },
    { t:'CEREBELO',       nx:0.62, ny:0.78 },
    { t:'TRONCO',         nx:0.36, ny:0.82 },
  ];
  labels.forEach(lb => {
    const [lx2,ly2] = p(lb.nx, lb.ny);
    bgX.fillText(lb.t, lx2, ly2);
  });
  bgX.restore();
}

function drawBrains() {
  bgX.clearRect(0, 0, W, H);
  const lay = getBrainLayout();

  // Hemisfério esquerdo (face anterior voltada para o centro = flip)
  drawBrainShape(lay.left.x, lay.left.y, lay.left.w, lay.left.h, true);
  // Hemisfério direito (face anterior voltada para o centro = normal)
  drawBrainShape(lay.right.x, lay.right.y, lay.right.w, lay.right.h, false);

  // Headers
  bgX.save();
  bgX.font = '8px Courier New';
  bgX.textAlign = 'center';
  bgX.fillStyle = 'rgba(200,218,255,0.22)';
  const lay2 = getBrainLayout();
  const lcx = lay2.left.x + lay2.left.w / 2;
  const rcx = lay2.right.x + lay2.right.w / 2;
  const ty = lay2.left.y - 18;
  bgX.fillText('HEMISFÉRIO ESQUERDO', lcx, ty);
  bgX.fillText('HEMISFÉRIO DIREITO', rcx, ty);
  bgX.font = '7px Courier New';
  bgX.fillStyle = 'rgba(200,218,255,0.10)';
  bgX.fillText('CONTROLE · LÓGICA · INFRAESTRUTURA', lcx, ty + 12);
  bgX.fillText('AGENTES · MEMÓRIA · INTERAÇÃO', rcx, ty + 12);

  // Linha divisória
  bgX.beginPath();
  bgX.moveTo(W/2, lay2.left.y - 10);
  bgX.lineTo(W/2, lay2.left.y + lay2.left.h + 10);
  bgX.strokeStyle = 'rgba(200,218,255,0.04)';
  bgX.lineWidth = 1; bgX.setLineDash([3,8]); bgX.stroke(); bgX.setLineDash([]);
  bgX.restore();
}

// ─── NÓ ───────────────────────────────────────────────────────────────────────
class Node {
  constructor(x, y, lobe, big) {
    this.ox = x; this.oy = y; this.x = x; this.y = y;
    this.lobe = lobe;
    this.r = big ? 3.0 : 1.0 + Math.random() * 1.6;
    this.phase = Math.random() * Math.PI * 2;
    this.spd = 0.007 + Math.random() * 0.011;
    this.drift = 3 + Math.random() * 7;
    this.da = Math.random() * Math.PI * 2;
    this.ds = 0.002 + Math.random() * 0.004;
    this.alpha = 0.25 + Math.random() * 0.35;
  }
  update() {
    this.phase += this.spd; this.da += this.ds;
    this.x = this.ox + Math.cos(this.da) * this.drift;
    this.y = this.oy + Math.sin(this.da * 0.75) * this.drift * 0.7;
  }
  draw(hi) {
    const pulse = 0.7 + Math.sin(this.phase) * 0.3;
    const a = this.alpha * pulse * (hi ? 2.2 : 1);
    const r = this.r * (hi ? 1.8 : 1);
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 5.5);
    g.addColorStop(0, `rgba(215,232,255,${a * 0.30})`);
    g.addColorStop(1, 'transparent');
    ctx.beginPath(); ctx.arc(this.x, this.y, r * 5.5, 0, Math.PI*2); ctx.fillStyle = g; ctx.fill();
    ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(228,242,255,${Math.min(a*1.3,0.92)})`; ctx.fill();
  }
}

// ─── SINAPSE ──────────────────────────────────────────────────────────────────
class Spark {
  constructor(a, b, cross) {
    this.a = a; this.b = b; this.t = 0;
    this.spd = 0.006 + Math.random() * 0.012;
    this.alive = true; this.cross = cross; sCnt++;
  }
  update() { this.t += this.spd; if (this.t >= 1) this.alive = false; }
  draw() {
    const px = this.a.x + (this.b.x - this.a.x) * this.t;
    const py = this.a.y + (this.b.y - this.a.y) * this.t;
    const al = Math.sin(this.t * Math.PI);
    const trail = 0.09;
    const tx = this.a.x + (this.b.x - this.a.x) * Math.max(0, this.t - trail);
    const ty = this.a.y + (this.b.y - this.a.y) * Math.max(0, this.t - trail);
    const g = ctx.createLinearGradient(tx, ty, px, py);
    g.addColorStop(0, 'transparent');
    g.addColorStop(1, `rgba(220,238,255,${al * (this.cross ? 0.70 : 0.52)})`);
    ctx.beginPath(); ctx.moveTo(tx, ty);
    if (this.cross) {
      const mx = (tx + px) / 2, my = Math.min(ty, py) - 22;
      ctx.quadraticCurveTo(mx, my, px, py);
    } else { ctx.lineTo(px, py); }
    ctx.strokeStyle = g; ctx.lineWidth = (this.cross ? 1.3 : 0.9) * al; ctx.stroke();
    ctx.beginPath(); ctx.arc(px, py, (this.cross ? 2.0 : 1.5) * al, 0, Math.PI*2);
    ctx.fillStyle = `rgba(232,244,255,${al * (this.cross ? 0.88 : 0.72)})`; ctx.fill();
  }
}

// ─── INICIALIZAÇÃO ────────────────────────────────────────────────────────────
function init() {
  nodes = []; connections = []; sparks = [];
  const lay = getBrainLayout();
  const nodeMap = {};

  function buildNodes(lobesDef, box, flip) {
    lobesDef.forEach(lobe => {
      const f = flip ? (1 - lobe.ncx) : lobe.ncx;
      const cx = box.x + f * box.w;
      const cy = box.y + lobe.ncy * box.h;
      const spread = Math.min(box.w, box.h) * 0.09;
      const arr = [];
      for (let i = 0; i < lobe.nodes; i++) {
        const a = Math.random() * Math.PI * 2;
        const d = Math.pow(Math.random(), 0.5) * spread;
        const nx = cx + Math.cos(a) * d;
        const ny = cy + Math.sin(a) * d;
        arr.push(new Node(nx, ny, lobe, i === 0));
        nodes.push(arr[arr.length - 1]);
      }
      nodeMap[lobe.id] = arr;
      for (let i = 0; i < arr.length; i++)
        for (let j = i + 1; j < arr.length; j++)
          if (Math.random() < 0.50) connections.push([arr[i], arr[j], false]);
    });
  }

  buildNodes(LOBES_DEF, lay.left, true);
  buildNodes(LOBES_RIGHT_DEF, lay.right, false);

  CROSS_IDS.forEach(([a, b]) => {
    const an = nodeMap[a], bn = nodeMap[b];
    if (an && bn) {
      const na = an[Math.floor(Math.random() * an.length)];
      const nb = bn[Math.floor(Math.random() * bn.length)];
      connections.push([na, nb, true]);
    }
  });
}

function drawConnections() {
  connections.forEach(([a, b, cross]) => {
    const dist = Math.hypot(a.x - b.x, a.y - b.y);
    if (!cross && dist > 160) return;
    const alpha = cross ? 0.05 : (1 - dist / 160) * 0.08;
    ctx.beginPath(); ctx.moveTo(a.x, a.y);
    if (cross) {
      const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2 - 18;
      ctx.quadraticCurveTo(mx, my, b.x, b.y);
    } else { ctx.lineTo(b.x, b.y); }
    ctx.strokeStyle = `rgba(200,220,255,${alpha})`;
    ctx.lineWidth = cross ? 0.5 : 0.4; ctx.stroke();
  });
}

// ─── LOOP ─────────────────────────────────────────────────────────────────────
let lastSpark = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  ctx.clearRect(0, 0, W, H);
  drawConnections();
  nodes.forEach(n => { n.update(); n.draw(hoveredLobe && n.lobe === hoveredLobe); });

  if (ts - lastSpark > 52 && sparks.length < 60 && Math.random() < 0.78) {
    const crossC = connections.filter(c => c[2]);
    const intraC = connections.filter(c => !c[2]);
    const useCross = Math.random() < 0.28 && crossC.length > 0;
    const pool = useCross ? crossC : intraC;
    const conn = pool[Math.floor(Math.random() * pool.length)];
    if (conn) {
      const [a, b, cross] = Math.random() < 0.5 ? conn : [conn[1], conn[0], conn[2]];
      sparks.push(new Spark(a, b, cross)); lastSpark = ts;
    }
  }
  sparks = sparks.filter(s => s.alive);
  sparks.forEach(s => { s.update(); s.draw(); });

  const now = Date.now();
  if (now - lastSec >= 1000) {
    sPerSec = sCnt; sCnt = 0; lastSec = now;
    document.getElementById('sv').textContent = sPerSec;
  }
}

// ─── INTERATIVIDADE ───────────────────────────────────────────────────────────
ovC.addEventListener('mousemove', e => {
  const mx = e.clientX, my = e.clientY;
  const lay = getBrainLayout();
  let best = null, bestD = Infinity;

  function checkLobes(lobesDef, box, flip) {
    lobesDef.forEach(lobe => {
      const f = flip ? (1 - lobe.ncx) : lobe.ncx;
      const cx = box.x + f * box.w;
      const cy = box.y + lobe.ncy * box.h;
      const d = Math.hypot(mx - cx, my - cy);
      const thresh = Math.min(box.w, box.h) * 0.14;
      if (d < thresh && d < bestD) { bestD = d; best = lobe; }
    });
  }
  checkLobes(LOBES_DEF, lay.left, true);
  checkLobes(LOBES_RIGHT_DEF, lay.right, false);

  hoveredLobe = best;
  const tt = document.getElementById('tooltip');
  if (best) {
    tt.style.opacity = '1';
    document.getElementById('tt-n').textContent = best.system;
    document.getElementById('tt-l').textContent = '↳ ' + best.brain;
    document.getElementById('tt-d').textContent = best.desc;
    document.getElementById('tt-m').textContent = best.meta;
    tt.style.left = (mx + 18) + 'px'; tt.style.top = (my - 10) + 'px';
    requestAnimationFrame(() => {
      const r = tt.getBoundingClientRect();
      if (r.right > W - 10) tt.style.left = (mx - r.width - 18) + 'px';
      if (r.bottom > H - 10) tt.style.top = (my - r.height) + 'px';
    });
  } else { tt.style.opacity = '0'; }
});

ovC.addEventListener('click', e => {
  if (!hoveredLobe) return;
  const rn = nodes.filter(n => n.lobe === hoveredLobe);
  for (let i = 0; i < 16; i++) {
    const a = rn[Math.floor(Math.random() * rn.length)];
    const b = nodes[Math.floor(Math.random() * nodes.length)];
    if (a && b && a !== b) {
      const cross = LOBES_DEF.includes(a.lobe) !== LOBES_DEF.includes(b.lobe);
      sparks.push(new Spark(a, b, cross));
    }
  }
});

drawBrains();
init();
loop(0);
</script>
