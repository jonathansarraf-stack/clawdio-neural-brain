<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clawdio — Neural Architecture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    width: 100vw;
    height: 100vh;
  }
  canvas { display: block; position: fixed; top: 0; left: 0; }

  #header {
    position: fixed;
    top: 22px; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    z-index: 10;
  }
  #header h1 {
    font-size: 11px;
    letter-spacing: 7px;
    color: rgba(200,220,255,0.45);
    text-transform: uppercase;
  }
  #header p {
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(200,220,255,0.18);
    margin-top: 5px;
    text-transform: uppercase;
  }

  #tooltip {
    position: fixed;
    background: rgba(0,0,0,0.88);
    border: 1px solid rgba(180,210,255,0.12);
    border-radius: 6px;
    padding: 13px 16px;
    max-width: 260px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s;
    z-index: 20;
    backdrop-filter: blur(12px);
  }
  #tooltip h3 {
    font-size: 10px;
    color: rgba(200,220,255,0.75);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  #tooltip .region-tag {
    font-size: 9px;
    color: rgba(200,220,255,0.3);
    letter-spacing: 1px;
    margin-bottom: 8px;
    font-style: italic;
  }
  #tooltip p {
    font-size: 10px;
    color: rgba(200,220,255,0.5);
    line-height: 1.65;
  }
  #tooltip .meta {
    margin-top: 8px;
    font-size: 9px;
    color: rgba(200,220,255,0.25);
    letter-spacing: 1px;
  }

  #stats {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 36px;
    pointer-events: none;
    z-index: 10;
  }
  .stat { text-align: center; }
  .stat-value {
    font-size: 18px;
    color: rgba(200,220,255,0.55);
    font-weight: bold;
  }
  .stat-label {
    font-size: 8px;
    color: rgba(200,220,255,0.2);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  #live {
    position: fixed;
    bottom: 22px; right: 22px;
    display: flex; align-items: center; gap: 7px;
    pointer-events: none; z-index: 10;
  }
  #live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(200,220,255,0.4);
    animation: blink 2s ease-in-out infinite;
  }
  #live span {
    font-size: 8px;
    letter-spacing: 2px;
    color: rgba(200,220,255,0.2);
    text-transform: uppercase;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.2; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="header">
  <h1>Clawdio — Neural Architecture</h1>
  <p>Sistema de Orquestração de Agentes Autônomos · v2.0</p>
</div>

<div id="tooltip">
  <h3 id="tt-name"></h3>
  <div class="region-tag" id="tt-region"></div>
  <p id="tt-desc"></p>
  <div class="meta" id="tt-meta"></div>
</div>

<div id="stats">
  <div class="stat"><div class="stat-value">28</div><div class="stat-label">Agentes</div></div>
  <div class="stat"><div class="stat-value">10</div><div class="stat-label">Escritórios</div></div>
  <div class="stat"><div class="stat-value">4</div><div class="stat-label">Providers</div></div>
  <div class="stat"><div class="stat-value" id="fps-val">—</div><div class="stat-label">Sinapses/s</div></div>
</div>

<div id="live"><div id="live-dot"></div><span>Ativo</span></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, SCALE;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
  SCALE = Math.min(W, H) * 0.40;
}
resize();
window.addEventListener('resize', () => { resize(); init(); });

// ─── REGIÕES (paleta monocromática) ──────────────────────────────────────────
const REGIONS = [
  { id:'router',    name:'Router Inteligente',    brain:'Córtex Pré-frontal',
    desc:'classifyMessageComplexity() — seleciona o modelo LLM ideal por prefixo explícito (@senior/@junior), padrões regex e comprimento do contexto.',
    meta:'Modelos: Opus · Sonnet · GLM Air · Gemini Flash',
    rx:0.00, ry:-0.40, r:0.14, nodes:9 },
  { id:'memory',    name:'RAG & Memória',          brain:'Lobo Temporal + Hipocampo',
    desc:'MEMORY.md + knowledge/ por agente. Base de conhecimento com embeddings. SOUL.md como identidade permanente. Contexto persistente entre sessões.',
    meta:'28 bases de conhecimento individuais',
    rx:-0.30, ry:-0.05, r:0.13, nodes:11 },
  { id:'agents',    name:'Agentes & Escritórios',  brain:'Lobo Parietal',
    desc:'28 agentes em 10 escritórios virtuais: Operações, Casa, Health, Porti, Eon Holding, Ethos, Marketing, Jurídico, Contabilidade, Software House.',
    meta:'28 agentes · 10 escritórios virtuais',
    rx:0.30, ry:-0.08, r:0.15, nodes:14 },
  { id:'interface', name:'Interface Web',          brain:'Lobo Occipital',
    desc:'openclaw-web-dev (porta 4001) e openclaw-web (4000). Painel de controle, chat com agentes, Kill Switch de gastos e monitoramento em tempo real.',
    meta:'DEV :4001 · PROD :4000',
    rx:-0.32, ry:-0.28, r:0.11, nodes:7 },
  { id:'gateway',   name:'Gateway WebSocket',      brain:'Cerebelo',
    desc:'openclaw-gateway (18789) e openclaw-gateway-dev (18790). Ponte bidirecional entre interface e providers LLM. Streaming SSE em tempo real.',
    meta:'DEV :18790 · PROD :18789',
    rx:0.08, ry:0.38, r:0.12, nodes:6 },
  { id:'infra',     name:'Infraestrutura VM',      brain:'Tronco Encefálico',
    desc:'DigitalOcean Droplet — Ubuntu 22.04 LTS, 4 vCPUs, 8GB RAM, 77GB SSD. systemd gerencia todos os serviços. PostgreSQL via Docker. Cloudflare ZTNA.',
    meta:'IP: 164.90.130.119 · São Paulo/NYC',
    rx:0.00, ry:0.52, r:0.10, nodes:5 },
  { id:'watchdog',  name:'Argos Watchdog',         brain:'Amígdala',
    desc:'clawdio-watchdog — Monitor de saúde do sistema. Kill Switch para corte total de gastos. Detecta falhas e reinicia serviços automaticamente.',
    meta:'Kill Switch · Health Monitor · Alertas',
    rx:0.26, ry:0.22, r:0.09, nodes:4 },
  { id:'discord',   name:'Bots Discord',           brain:'Córtex Motor',
    desc:'clawdio-sala-geral + bot_prod.js. Chamadas diretas à API Anthropic sem passar pelo gateway. Camila Daily Briefing às 10h via Google Calendar.',
    meta:'sala-geral · bot_prod · briefing diário',
    rx:-0.14, ry:0.40, r:0.09, nodes:5 },
  { id:'billing',   name:'Billing & Governança',   brain:'Ínsula',
    desc:'billing.jsonl — log de tokens por agente e modelo. Heartbeats a cada 30min (20 agentes). Custo estimado ~$169/mês sem Kill Switch ativo.',
    meta:'billing.jsonl · ~$169/mês heartbeats',
    rx:-0.04, ry:0.18, r:0.08, nodes:4 },
  { id:'llm',       name:'Multi-LLM Providers',    brain:'Corpo Caloso',
    desc:'Anthropic (Opus/Sonnet/Haiku), Google Gemini (2.5 Pro/Flash), OpenAI (GPT-4o), Zhipu GLM (4.5 Air/Flash — gratuito). Fallback automático.',
    meta:'25+ modelos · 4 providers · fallback auto',
    rx:0.05, ry:-0.15, r:0.12, nodes:9 },
];

// Conexões inter-regionais
const INTER = [
  ['router','llm'],['router','agents'],['router','memory'],
  ['agents','memory'],['agents','gateway'],['gateway','llm'],
  ['gateway','interface'],['interface','router'],['watchdog','gateway'],
  ['watchdog','infra'],['billing','router'],['billing','watchdog'],
  ['discord','llm'],['discord','agents'],['infra','gateway'],['memory','llm'],
];

// ─── ESTADO ───────────────────────────────────────────────────────────────────
let nodes = [], connections = [], sparks = [];
let hoveredRegion = null;
let synapseCount = 0, synapsePerSec = 0, lastSec = Date.now();

// ─── FORMA ANATÔMICA DO CÉREBRO ───────────────────────────────────────────────
// Pontos de controle para desenhar um cérebro humano visto de cima
// Hemisfério esquerdo e direito com sulco central (fissura longitudinal)
function drawBrainSilhouette() {
  const s = SCALE;

  ctx.save();
  ctx.translate(cx, cy);

  // Sombra/glow externo suave
  const grd = ctx.createRadialGradient(0, 0, s * 0.1, 0, 0, s * 1.05);
  grd.addColorStop(0, 'rgba(180,210,255,0.025)');
  grd.addColorStop(0.6, 'rgba(180,210,255,0.012)');
  grd.addColorStop(1, 'transparent');

  // Hemisfério esquerdo
  ctx.beginPath();
  ctx.moveTo(0, -s * 0.72);
  ctx.bezierCurveTo(-s*0.05, -s*0.82, -s*0.32, -s*0.88, -s*0.52, -s*0.72);
  ctx.bezierCurveTo(-s*0.72, -s*0.56, -s*0.82, -s*0.30, -s*0.80, -s*0.05);
  ctx.bezierCurveTo(-s*0.78, s*0.18, -s*0.68, s*0.42, -s*0.50, s*0.58);
  ctx.bezierCurveTo(-s*0.32, s*0.72, -s*0.12, s*0.76, 0, s*0.72);
  ctx.bezierCurveTo(-s*0.04, s*0.40, -s*0.04, -s*0.40, 0, -s*0.72);
  ctx.closePath();
  ctx.fillStyle = grd;
  ctx.fill();
  ctx.strokeStyle = 'rgba(180,210,255,0.10)';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // Hemisfério direito
  ctx.beginPath();
  ctx.moveTo(0, -s * 0.72);
  ctx.bezierCurveTo(s*0.05, -s*0.82, s*0.32, -s*0.88, s*0.52, -s*0.72);
  ctx.bezierCurveTo(s*0.72, -s*0.56, s*0.82, -s*0.30, s*0.80, -s*0.05);
  ctx.bezierCurveTo(s*0.78, s*0.18, s*0.68, s*0.42, s*0.50, s*0.58);
  ctx.bezierCurveTo(s*0.32, s*0.72, s*0.12, s*0.76, 0, s*0.72);
  ctx.bezierCurveTo(s*0.04, s*0.40, s*0.04, -s*0.40, 0, -s*0.72);
  ctx.closePath();
  ctx.fillStyle = grd;
  ctx.fill();
  ctx.strokeStyle = 'rgba(180,210,255,0.10)';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // Sulco central (fissura longitudinal)
  ctx.beginPath();
  ctx.moveTo(0, -s * 0.72);
  ctx.bezierCurveTo(s*0.03, -s*0.30, -s*0.03, s*0.30, 0, s*0.72);
  ctx.strokeStyle = 'rgba(180,210,255,0.07)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Sulcos secundários (giros) — hemisfério esquerdo
  const sulcosL = [
    { pts: [[-0.52,-0.50],[-0.38,-0.62],[-0.20,-0.68]] },
    { pts: [[-0.65,-0.20],[-0.55,-0.08],[-0.48, 0.10]] },
    { pts: [[-0.72, 0.10],[-0.60, 0.28],[-0.44, 0.42]] },
    { pts: [[-0.28,-0.55],[-0.18,-0.45],[-0.08,-0.35]] },
    { pts: [[-0.40, 0.30],[-0.28, 0.18],[-0.14, 0.10]] },
    { pts: [[-0.55, 0.50],[-0.38, 0.58],[-0.20, 0.62]] },
    { pts: [[-0.20,-0.20],[-0.10,-0.10],[-0.04, 0.05]] },
  ];
  const sulcosR = sulcosL.map(s => ({ pts: s.pts.map(([x,y]) => [-x, y]) }));

  [...sulcosL, ...sulcosR].forEach(sulco => {
    const pts = sulco.pts;
    ctx.beginPath();
    ctx.moveTo(pts[0][0]*s, pts[0][1]*s);
    if (pts.length === 3) {
      ctx.quadraticCurveTo(pts[1][0]*s, pts[1][1]*s, pts[2][0]*s, pts[2][1]*s);
    } else {
      ctx.lineTo(pts[1][0]*s, pts[1][1]*s);
    }
    ctx.strokeStyle = 'rgba(180,210,255,0.055)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  });

  ctx.restore();
}

// ─── NÓS ─────────────────────────────────────────────────────────────────────
class Node {
  constructor(x, y, region) {
    this.ox = x; this.oy = y;
    this.x = x; this.y = y;
    this.region = region;
    this.r = 1.2 + Math.random() * 1.8;
    this.phase = Math.random() * Math.PI * 2;
    this.speed = 0.008 + Math.random() * 0.012;
    this.drift = 6 + Math.random() * 10;
    this.driftAngle = Math.random() * Math.PI * 2;
    this.driftSpeed = 0.002 + Math.random() * 0.004;
    this.alpha = 0.3 + Math.random() * 0.4;
  }
  update() {
    this.phase += this.speed;
    this.driftAngle += this.driftSpeed;
    this.x = this.ox + Math.cos(this.driftAngle) * this.drift;
    this.y = this.oy + Math.sin(this.driftAngle * 0.8) * this.drift * 0.7;
  }
  draw(highlight) {
    const pulse = 0.7 + Math.sin(this.phase) * 0.3;
    const a = this.alpha * pulse * (highlight ? 1.8 : 1);
    const r = this.r * (highlight ? 1.6 : 1);

    // Glow
    const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 5);
    grd.addColorStop(0, `rgba(200,220,255,${a * 0.3})`);
    grd.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(this.x, this.y, r * 5, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    // Núcleo
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220,235,255,${Math.min(a * 1.2, 0.9)})`;
    ctx.fill();
  }
}

// ─── SINAPSES ─────────────────────────────────────────────────────────────────
class Spark {
  constructor(a, b) {
    this.a = a; this.b = b;
    this.t = 0;
    this.speed = 0.008 + Math.random() * 0.014;
    this.alive = true;
    synapseCount++;
  }
  update() {
    this.t += this.speed;
    if (this.t >= 1) this.alive = false;
  }
  draw() {
    const px = this.a.x + (this.b.x - this.a.x) * this.t;
    const py = this.a.y + (this.b.y - this.a.y) * this.t;
    const alpha = Math.sin(this.t * Math.PI);

    // Trail
    const trail = 0.10;
    const tx = this.a.x + (this.b.x - this.a.x) * Math.max(0, this.t - trail);
    const ty = this.a.y + (this.b.y - this.a.y) * Math.max(0, this.t - trail);

    const g = ctx.createLinearGradient(tx, ty, px, py);
    g.addColorStop(0, 'transparent');
    g.addColorStop(1, `rgba(210,230,255,${alpha * 0.6})`);
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(px, py);
    ctx.strokeStyle = g;
    ctx.lineWidth = 1.2 * alpha;
    ctx.stroke();

    // Ponta
    ctx.beginPath();
    ctx.arc(px, py, 2 * alpha, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(230,240,255,${alpha * 0.85})`;
    ctx.fill();
  }
}

// ─── INICIALIZAÇÃO ────────────────────────────────────────────────────────────
function init() {
  nodes = []; connections = []; sparks = [];

  const regionNodeMap = {};

  REGIONS.forEach(reg => {
    const rcx = cx + reg.rx * SCALE;
    const rcy = cy + reg.ry * SCALE;
    const spread = SCALE * reg.r;
    const arr = [];

    for (let i = 0; i < reg.nodes; i++) {
      let nx, ny, tries = 0;
      do {
        const a = Math.random() * Math.PI * 2;
        const d = Math.pow(Math.random(), 0.5) * spread;
        nx = rcx + Math.cos(a) * d;
        ny = rcy + Math.sin(a) * d;
        tries++;
      } while (!insideBrain(nx, ny) && tries < 40);

      const n = new Node(nx, ny, reg);
      if (i === 0) n.r = 3.5; // nó central maior
      arr.push(n);
      nodes.push(n);
    }
    regionNodeMap[reg.id] = arr;

    // Conexões intra-região
    for (let i = 0; i < arr.length; i++) {
      for (let j = i + 1; j < arr.length; j++) {
        if (Math.random() < 0.5) connections.push([arr[i], arr[j]]);
      }
    }
  });

  // Conexões inter-região
  INTER.forEach(([aId, bId]) => {
    const an = regionNodeMap[aId], bn = regionNodeMap[bId];
    if (an && bn) {
      const a = an[Math.floor(Math.random() * an.length)];
      const b = bn[Math.floor(Math.random() * bn.length)];
      connections.push([a, b]);
    }
  });
}

function insideBrain(x, y) {
  const dx = (x - cx) / SCALE;
  const dy = (y - cy) / SCALE;
  // Forma oval do cérebro com lóbulos
  const r = Math.sqrt(dx*dx*1.4 + dy*dy);
  const angle = Math.atan2(dy, dx);
  const boundary = 0.78 + 0.08 * Math.cos(2 * angle) + 0.04 * Math.cos(4 * angle);
  return r < boundary;
}

// ─── CONEXÕES ESTÁTICAS ───────────────────────────────────────────────────────
function drawConnections() {
  connections.forEach(([a, b]) => {
    const dist = Math.hypot(a.x - b.x, a.y - b.y);
    if (dist > 200) return;
    const alpha = (1 - dist / 200) * 0.10;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = `rgba(200,220,255,${alpha})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  });
}

// ─── LABELS ───────────────────────────────────────────────────────────────────
function drawLabels() {
  REGIONS.forEach(reg => {
    const x = cx + reg.rx * SCALE;
    const y = cy + reg.ry * SCALE;
    const isHovered = hoveredRegion === reg;
    const alpha = isHovered ? 0.65 : 0.22;

    ctx.save();
    ctx.font = `${isHovered ? 'bold ' : ''}9px Courier New`;
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(200,220,255,${alpha})`;
    if (isHovered) {
      ctx.shadowColor = 'rgba(200,220,255,0.4)';
      ctx.shadowBlur = 10;
    }
    ctx.fillText(reg.name.toUpperCase(), x, y - 20);
    ctx.restore();
  });
}

// ─── LOOP ─────────────────────────────────────────────────────────────────────
let lastSpark = 0;

function loop(ts) {
  requestAnimationFrame(loop);

  // Fade suave
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(0, 0, W, H);

  drawBrainSilhouette();
  drawConnections();

  // Nós
  nodes.forEach(n => {
    n.update();
    n.draw(hoveredRegion && n.region === hoveredRegion);
  });

  // Disparar sinapses
  if (ts - lastSpark > 55 && sparks.length < 50 && Math.random() < 0.75) {
    const conn = connections[Math.floor(Math.random() * connections.length)];
    if (conn) {
      const [a, b] = Math.random() < 0.5 ? conn : [conn[1], conn[0]];
      sparks.push(new Spark(a, b));
      lastSpark = ts;
    }
  }

  sparks = sparks.filter(s => s.alive);
  sparks.forEach(s => { s.update(); s.draw(); });

  drawLabels();

  // Contador
  const now = Date.now();
  if (now - lastSec >= 1000) {
    synapsePerSec = synapseCount;
    synapseCount = 0;
    lastSec = now;
    document.getElementById('fps-val').textContent = synapsePerSec;
  }
}

// ─── INTERATIVIDADE ───────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const mx = e.clientX, my = e.clientY;
  let best = null, bestD = Infinity;

  REGIONS.forEach(reg => {
    const rx = cx + reg.rx * SCALE;
    const ry = cy + reg.ry * SCALE;
    const d = Math.hypot(mx - rx, my - ry);
    if (d < SCALE * 0.17 && d < bestD) { bestD = d; best = reg; }
  });

  hoveredRegion = best;
  const tt = document.getElementById('tooltip');

  if (best) {
    tt.style.opacity = '1';
    let lx = mx + 18, ly = my - 10;
    document.getElementById('tt-name').textContent = best.name;
    document.getElementById('tt-region').textContent = '↳ ' + best.brain;
    document.getElementById('tt-desc').textContent = best.desc;
    document.getElementById('tt-meta').textContent = best.meta;
    tt.style.left = lx + 'px';
    tt.style.top = ly + 'px';
    // Ajuste de borda
    requestAnimationFrame(() => {
      const r = tt.getBoundingClientRect();
      if (r.right > W - 10) tt.style.left = (mx - r.width - 18) + 'px';
      if (r.bottom > H - 10) tt.style.top = (my - r.height) + 'px';
    });
  } else {
    tt.style.opacity = '0';
  }
});

canvas.addEventListener('click', e => {
  if (!hoveredRegion) return;
  const rn = nodes.filter(n => n.region === hoveredRegion);
  for (let i = 0; i < 12; i++) {
    const a = rn[Math.floor(Math.random() * rn.length)];
    const b = nodes[Math.floor(Math.random() * nodes.length)];
    if (a && b && a !== b) sparks.push(new Spark(a, b));
  }
});

init();
loop(0);
</script>
</body>
</html>
