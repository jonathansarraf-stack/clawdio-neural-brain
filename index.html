// ─── ESTRUTURA DE NÓS ─────────────────────────────────────────────────────────
let nodes = [];
let connections = [];
let synapses = [];
let synapseCountPerSec = 0;
let synapseFireCount = 0;
let lastSecond = Date.now();

class Node {
  constructor(x, y, region, size = 3) {
    this.x = x;
    this.y = y;
    this.region = region;
    this.baseSize = size;
    this.size = size;
    this.pulse = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.02 + Math.random() * 0.03;
    this.alpha = 0.5 + Math.random() * 0.5;
    this.vx = (Math.random() - 0.5) * 0.15;
    this.vy = (Math.random() - 0.5) * 0.15;
    this.ox = x;
    this.oy = y;
    this.driftRange = 8 + Math.random() * 12;
    this.driftAngle = Math.random() * Math.PI * 2;
    this.driftSpeed = 0.003 + Math.random() * 0.005;
  }

  update() {
    this.pulse += this.pulseSpeed;
    this.driftAngle += this.driftSpeed;
    this.x = this.ox + Math.cos(this.driftAngle) * this.driftRange;
    this.y = this.oy + Math.sin(this.driftAngle * 0.7) * this.driftRange * 0.6;
    this.size = this.baseSize + Math.sin(this.pulse) * 1.2;
  }

  draw() {
    const r = this.region;
    const alpha = this.alpha * (0.7 + Math.sin(this.pulse) * 0.3);

    // Glow externo
    const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 4);
    grd.addColorStop(0, r.glow + '55');
    grd.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    // Núcleo
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = r.color;
    ctx.globalAlpha = alpha;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class Synapse {
  constructor(fromNode, toNode) {
    this.from = fromNode;
    this.to = toNode;
    this.progress = 0;
    this.speed = 0.012 + Math.random() * 0.018;
    this.size = 2.5 + Math.random() * 2;
    this.color = fromNode.region.glow;
    this.alive = true;
    synapseFireCount++;
  }

  update() {
    this.progress += this.speed;
    if (this.progress >= 1) this.alive = false;
  }

  draw() {
    const x = this.from.x + (this.to.x - this.from.x) * this.progress;
    const y = this.from.y + (this.to.y - this.from.y) * this.progress;
    const alpha = Math.sin(this.progress * Math.PI);

    // Trail
    const trailLen = 0.08;
    const tx = this.from.x + (this.to.x - this.from.x) * Math.max(0, this.progress - trailLen);
    const ty = this.from.y + (this.to.y - this.from.y) * Math.max(0, this.progress - trailLen);

    const grad = ctx.createLinearGradient(tx, ty, x, y);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(1, this.color + Math.floor(alpha * 200).toString(16).padStart(2, '0'));

    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(x, y);
    ctx.strokeStyle = grad;
    ctx.lineWidth = this.size * alpha;
    ctx.globalAlpha = alpha;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Ponta brilhante
    ctx.beginPath();
    ctx.arc(x, y, this.size * alpha * 1.5, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = alpha * 0.9;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ─── FORMA DO CÉREBRO ─────────────────────────────────────────────────────────
function brainShape(t) {
  // Forma aproximada de cérebro humano visto de cima
  const a = 1.0;
  const b = 0.72;
  // Hemisfério esquerdo e direito com sulco central
  const x = a * Math.cos(t) * (1 + 0.15 * Math.cos(2 * t)) * (1 - 0.08 * Math.abs(Math.sin(t)));
  const y = b * Math.sin(t) * (1 + 0.1 * Math.cos(t));
  return { x, y };
}

function isInsideBrain(nx, ny, scale) {
  // Verifica se o ponto está dentro da forma do cérebro
  const dx = (nx - cx) / scale;
  const dy = (ny - cy) / (scale * 0.72);
  const r = Math.sqrt(dx * dx + dy * dy);
  // Forma oval com lóbulos
  const angle = Math.atan2(dy, dx);
  const boundary = 0.88 + 0.12 * Math.cos(2 * angle) + 0.05 * Math.cos(4 * angle);
  return r < boundary;
}

function buildBrain() {
  nodes = [];
  connections = [];
  synapses = [];

  const scale = Math.min(W, H) * 0.38;

  // Gerar nós por região
  REGIONS.forEach(region => {
    const regionNodes = [];
    const centerX = cx + region.rx * scale * 1.1;
    const centerY = cy + region.ry * scale * 1.1;
    const spread = scale * 0.12 * region.size;

    for (let i = 0; i < region.nodeCount; i++) {
      let nx, ny, attempts = 0;
      do {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * spread;
        nx = centerX + Math.cos(angle) * dist;
        ny = centerY + Math.sin(angle) * dist;
        attempts++;
      } while (!isInsideBrain(nx, ny, scale) && attempts < 30);

      const nodeSize = i === 0
        ? 4 + region.size * 2
        : 2 + Math.random() * 2.5;

      const n = new Node(nx, ny, region, nodeSize);
      regionNodes.push(n);
      nodes.push(n);
    }

    // Conectar nós dentro da região
    for (let i = 0; i < regionNodes.length; i++) {
      for (let j = i + 1; j < regionNodes.length; j++) {
        if (Math.random() < 0.55) {
          connections.push([regionNodes[i], regionNodes[j]]);
        }
      }
    }
  });

  // Conectar regiões entre si (sinapses inter-regionais)
  const interConnections = [
    ['router', 'llm'],
    ['router', 'agents'],
    ['router', 'memory'],
    ['agents', 'memory'],
    ['agents', 'gateway'],
    ['gateway', 'llm'],
    ['gateway', 'interface'],
    ['interface', 'router'],
    ['watchdog', 'gateway'],
    ['watchdog', 'infra'],
    ['billing', 'router'],
    ['billing', 'watchdog'],
    ['discord', 'llm'],
    ['discord', 'agents'],
    ['infra', 'gateway'],
    ['memory', 'llm'],
  ];

  interConnections.forEach(([aId, bId]) => {
    const aRegion = REGIONS.find(r => r.id === aId);
    const bRegion = REGIONS.find(r => r.id === bId);
    const aNodes = nodes.filter(n => n.region === aRegion);
    const bNodes = nodes.filter(n => n.region === bRegion);
    if (aNodes.length && bNodes.length) {
      const a = aNodes[Math.floor(Math.random() * aNodes.length)];
      const b = bNodes[Math.floor(Math.random() * bNodes.length)];
      connections.push([a, b]);
    }
  });
}

// ─── RENDERIZAÇÃO DO CONTORNO DO CÉREBRO ──────────────────────────────────────
function drawBrainOutline() {
  const scale = Math.min(W, H) * 0.38;

  // Sulco central (fissura longitudinal)
  ctx.beginPath();
  ctx.moveTo(cx, cy - scale * 0.72);
  ctx.bezierCurveTo(
    cx + scale * 0.04, cy - scale * 0.2,
    cx - scale * 0.04, cy + scale * 0.2,
    cx, cy + scale * 0.72
  );
  ctx.strokeStyle = '#00ffc811';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Contorno do cérebro
  ctx.beginPath();
  for (let t = 0; t <= Math.PI * 2; t += 0.02) {
    const p = brainShape(t);
    const x = cx + p.x * scale;
    const y = cy + p.y * scale;
    if (t === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();

  // Gradiente de borda
  const grd = ctx.createRadialGradient(cx, cy, scale * 0.3, cx, cy, scale * 1.1);
  grd.addColorStop(0, 'transparent');
  grd.addColorStop(0.7, '#00ffc803');
  grd.addColorStop(1, '#00ffc811');
  ctx.fillStyle = grd;
  ctx.fill();

  ctx.strokeStyle = '#00ffc822';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Sulcos secundários (giros cerebrais)
  const sulcos = [
    { cx: -0.2, cy: -0.3, rx: 0.18, ry: 0.08, rot: -0.3 },
    { cx: 0.22, cy: -0.28, rx: 0.15, ry: 0.07, rot: 0.4 },
    { cx: -0.3, cy: 0.1, rx: 0.12, ry: 0.06, rot: -0.1 },
    { cx: 0.28, cy: 0.15, rx: 0.14, ry: 0.06, rot: 0.2 },
    { cx: 0, cy: 0.3, rx: 0.2, ry: 0.07, rot: 0 },
    { cx: -0.1, cy: -0.1, rx: 0.1, ry: 0.05, rot: 0.5 },
    { cx: 0.15, cy: 0.05, rx: 0.12, ry: 0.05, rot: -0.3 },
  ];

  sulcos.forEach(s => {
    ctx.save();
    ctx.translate(cx + s.cx * scale, cy + s.cy * scale);
    ctx.rotate(s.rot);
    ctx.beginPath();
    ctx.ellipse(0, 0, s.rx * scale, s.ry * scale, 0, 0, Math.PI * 2);
    ctx.strokeStyle = '#00ffc808';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  });
}

// ─── LABELS DAS REGIÕES ───────────────────────────────────────────────────────
function drawRegionLabels() {
  const scale = Math.min(W, H) * 0.38;

  REGIONS.forEach(region => {
    const x = cx + region.rx * scale * 1.1;
    const y = cy + region.ry * scale * 1.1;

    ctx.save();
    ctx.font = '9px Courier New';
    ctx.letterSpacing = '1px';
    ctx.textAlign = 'center';
    ctx.fillStyle = region.color + 'aa';
    ctx.shadowColor = region.glow;
    ctx.shadowBlur = 8;
    ctx.fillText(region.name.toUpperCase(), x, y - 22);
    ctx.restore();
  });
}

// ─── CONEXÕES ESTÁTICAS ───────────────────────────────────────────────────────
function drawConnections() {
  connections.forEach(([a, b]) => {
    const dist = Math.hypot(a.x - b.x, a.y - b.y);
    const maxDist = 180;
    if (dist > maxDist) return;

    const alpha = (1 - dist / maxDist) * 0.18;
    const sameRegion = a.region === b.region;
    const color = sameRegion ? a.region.color : '#ffffff';

    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
    ctx.lineWidth = sameRegion ? 0.8 : 0.4;
    ctx.stroke();
  });
}

// ─── DISPARO DE SINAPSES ──────────────────────────────────────────────────────
let lastSynapseTime = 0;
function maybeFiringSynapse(timestamp) {
  if (timestamp - lastSynapseTime < 60) return;
  lastSynapseTime = timestamp;

  if (synapses.length < 60 && Math.random() < 0.7) {
    const conn = connections[Math.floor(Math.random() * connections.length)];
    if (conn) {
      const [a, b] = Math.random() < 0.5 ? conn : [conn[1], conn[0]];
      synapses.push(new Synapse(a, b));
    }
  }
}

// ─── INTERATIVIDADE ───────────────────────────────────────────────────────────
let hoveredRegion = null;
canvas.addEventListener('mousemove', (e) => {
  const mx = e.clientX;
  const my = e.clientY;
  const scale = Math.min(W, H) * 0.38;

  let closest = null;
  let closestDist = Infinity;

  REGIONS.forEach(region => {
    const rx = cx + region.rx * scale * 1.1;
    const ry = cy + region.ry * scale * 1.1;
    const dist = Math.hypot(mx - rx, my - ry);
    if (dist < closestDist && dist < scale * 0.18) {
      closestDist = dist;
      closest = region;
    }
  });

  hoveredRegion = closest;

  if (closest) {
    tooltip.style.opacity = '1';
    tooltip.style.left = (mx + 20) + 'px';
    tooltip.style.top = (my - 20) + 'px';
    document.getElementById('tt-name').textContent = closest.name;
    document.getElementById('tt-region').textContent = '↳ ' + closest.brainRegion;
    document.getElementById('tt-desc').textContent = closest.desc;
    document.getElementById('tt-nodes').textContent = closest.nodes;

    // Ajustar posição para não sair da tela
    const rect = tooltip.getBoundingClientRect();
    if (rect.right > W - 10) tooltip.style.left = (mx - rect.width - 20) + 'px';
    if (rect.bottom > H - 10) tooltip.style.top = (my - rect.height) + 'px';
  } else {
    tooltip.style.opacity = '0';
  }
});

canvas.addEventListener('click', (e) => {
  if (hoveredRegion) {
    // Disparar burst de sinapses na região clicada
    const regionNodes = nodes.filter(n => n.region === hoveredRegion);
    for (let i = 0; i < 8; i++) {
      const a = regionNodes[Math.floor(Math.random() * regionNodes.length)];
      const b = nodes[Math.floor(Math.random() * nodes.length)];
      if (a && b && a !== b) {
        synapses.push(new Synapse(a, b));
      }
    }
  }
});

// ─── LOOP PRINCIPAL ───────────────────────────────────────────────────────────
let frame = 0;
function animate(timestamp) {
  requestAnimationFrame(animate);
  frame++;

  // Fundo com fade
  ctx.fillStyle = 'rgba(2, 4, 8, 0.15)';
  ctx.fillRect(0, 0, W, H);

  drawBrainOutline();
  drawConnections();

  // Atualizar e desenhar nós
  nodes.forEach(n => {
    n.update();

    // Highlight se região hovered
    if (hoveredRegion && n.region === hoveredRegion) {
      n.size = n.baseSize * 1.6;
    }

    n.draw();
  });

  // Sinapses
  maybeFiringSynapse(timestamp);
  synapses = synapses.filter(s => s.alive);
  synapses.forEach(s => { s.update(); s.draw(); });

  drawRegionLabels();

  // Contador de sinapses por segundo
  const now = Date.now();
  if (now - lastSecond >= 1000) {
    synapseCountPerSec = synapseFireCount;
    synapseFireCount = 0;
    lastSecond = now;
    document.getElementById('synapse-count').textContent = synapseCountPerSec;
  }
}

buildBrain();
animate(0);
</script>
