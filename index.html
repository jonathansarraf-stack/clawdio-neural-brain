<!DOCTYPE html>

<head>

<style>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', () => { resize(); init(); });

// ─── FORMA DO CÉREBRO EM PERFIL LATERAL ──────────────────────────────────────
// Desenha um cérebro humano visto de lado (perfil direito)
// Baseado na anatomia real: lobo frontal, parietal, occipital, temporal, cerebelo, tronco
function brainPath(ctx, ox, oy, sc, flip) {
  const f = flip ? -1 : 1;
  ctx.save();
  ctx.translate(ox, oy);
  ctx.scale(f, 1);

  // Córtex principal (hemisfério)
  ctx.beginPath();
  // Topo frontal
  ctx.moveTo(sc*0.05, -sc*0.72);
  // Lobo frontal (frente)
  ctx.bezierCurveTo(sc*0.28, -sc*0.88, sc*0.55, -sc*0.90, sc*0.62, -sc*0.78);
  // Topo parietal
  ctx.bezierCurveTo(sc*0.72, -sc*0.65, sc*0.78, -sc*0.50, sc*0.80, -sc*0.30);
  // Lobo occipital (traseiro topo)
  ctx.bezierCurveTo(sc*0.82, -sc*0.10, sc*0.80, sc*0.08, sc*0.72, sc*0.22);
  // Occipital (traseiro)
  ctx.bezierCurveTo(sc*0.62, sc*0.38, sc*0.48, sc*0.48, sc*0.32, sc*0.50);
  // Cerebelo (parte traseira inferior)
  ctx.bezierCurveTo(sc*0.18, sc*0.52, sc*0.05, sc*0.58, -sc*0.05, sc*0.62);
  ctx.bezierCurveTo(-sc*0.15, sc*0.66, -sc*0.22, sc*0.62, -sc*0.22, sc*0.52);
  ctx.bezierCurveTo(-sc*0.22, sc*0.42, -sc*0.15, sc*0.35, -sc*0.08, sc*0.28);
  // Tronco encefálico
  ctx.bezierCurveTo(sc*0.02, sc*0.20, sc*0.08, sc*0.12, sc*0.05, sc*0.02);
  // Lobo temporal (parte inferior frontal)
  ctx.bezierCurveTo(sc*0.02, -sc*0.12, -sc*0.05, -sc*0.28, -sc*0.08, -sc*0.42);
  ctx.bezierCurveTo(-sc*0.10, -sc*0.55, -sc*0.05, -sc*0.65, sc*0.05, -sc*0.72);
  ctx.closePath();

  ctx.restore();
}

function brainGiros(ctx, ox, oy, sc, flip) {
  const f = flip ? -1 : 1;
  ctx.save();
  ctx.translate(ox, oy);
  ctx.scale(f, 1);

  // Sulcos e giros do cérebro em perfil
  const sulcos = [
    // Sulco central (Rolando)
    [[sc*0.35,-sc*0.82],[sc*0.28,-sc*0.55],[sc*0.22,-sc*0.20]],
    // Sulco lateral (Sylvius)
    [[sc*0.05,-sc*0.42],[sc*0.25,-sc*0.38],[sc*0.52,-sc*0.30]],
    // Sulco parieto-occipital
    [[sc*0.62,-sc*0.50],[sc*0.68,-sc*0.28],[sc*0.70,-sc*0.05]],
    // Giro frontal superior
    [[sc*0.12,-sc*0.78],[sc*0.22,-sc*0.72],[sc*0.30,-sc*0.62]],
    // Giro frontal médio
    [[sc*0.08,-sc*0.60],[sc*0.18,-sc*0.55],[sc*0.28,-sc*0.48]],
    // Giro parietal
    [[sc*0.40,-sc*0.65],[sc*0.50,-sc*0.55],[sc*0.58,-sc*0.40]],
    // Giro temporal superior
    [[sc*0.10,-sc*0.25],[sc*0.28,-sc*0.22],[sc*0.45,-sc*0.18]],
    // Giro temporal médio
    [[sc*0.08,-sc*0.08],[sc*0.25,-sc*0.05],[sc*0.42, sc*0.02]],
    // Occipital
    [[sc*0.60, sc*0.05],[sc*0.65, sc*0.18],[sc*0.62, sc*0.32]],
    // Cerebelo sulcos
    [[-sc*0.02, sc*0.42],[sc*0.08, sc*0.50],[sc*0.20, sc*0.52]],
    [[sc*0.00, sc*0.55],[sc*0.12, sc*0.58],[sc*0.22, sc*0.55]],
  ];

  sulcos.forEach(pts => {
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    ctx.quadraticCurveTo(pts[1][0], pts[1][1], pts[2][0], pts[2][1]);
    ctx.strokeStyle = 'rgba(200,220,255,0.06)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  });

  ctx.restore();
}

// ─── REGIÕES POR HEMISFÉRIO ───────────────────────────────────────────────────
// Hemisfério ESQUERDO = Sistema de Controle / Lógica / Infraestrutura
// Hemisfério DIREITO  = Criatividade / Agentes / Interação

const REGIONS_LEFT = [
  { id:'router',    name:'Router Inteligente',   brain:'Córtex Pré-frontal',
    desc:'classifyMessageComplexity() — seleciona o modelo LLM por prefixo (@senior/@junior), padrões regex e comprimento do contexto.',
    meta:'Opus · Sonnet · GLM Air · Gemini Flash',
    rx:0.25, ry:-0.60, r:0.12, nodes:8 },
  { id:'gateway',   name:'Gateway WebSocket',    brain:'Córtex Motor',
    desc:'openclaw-gateway (18789) e openclaw-gateway-dev (18790). Ponte bidirecional entre interface e providers LLM. Streaming SSE em tempo real.',
    meta:'DEV :18790 · PROD :18789',
    rx:0.48, ry:-0.32, r:0.10, nodes:6 },
  { id:'infra',     name:'Infraestrutura VM',    brain:'Tronco Encefálico',
    desc:'DigitalOcean — Ubuntu 22.04, 4 vCPUs, 8GB RAM, 77GB SSD. systemd gerencia todos os serviços. PostgreSQL via Docker. Cloudflare ZTNA.',
    meta:'IP: 164.90.130.119 · São Paulo/NYC',
    rx:0.02, ry: 0.18, r:0.09, nodes:5 },
  { id:'watchdog',  name:'Argos Watchdog',       brain:'Amígdala',
    desc:'clawdio-watchdog — Monitor de saúde. Kill Switch para corte total de gastos. Detecta falhas e reinicia serviços automaticamente.',
    meta:'Kill Switch · Health Monitor · Alertas',
    rx:0.38, ry: 0.05, r:0.09, nodes:4 },
  { id:'billing',   name:'Billing & Governança', brain:'Ínsula',
    desc:'billing.jsonl — log de tokens por agente e modelo. Heartbeats a cada 30min (20 agentes). Custo estimado ~$169/mês sem Kill Switch.',
    meta:'billing.jsonl · ~$169/mês heartbeats',
    rx:0.18, ry:-0.18, r:0.08, nodes:4 },
];

const REGIONS_RIGHT = [
  { id:'agents',    name:'Agentes & Escritórios', brain:'Lobo Parietal',
    desc:'28 agentes em 10 escritórios virtuais: Operações, Casa, Health, Porti, Eon Holding, Ethos, Marketing, Jurídico, Contabilidade, Software House.',
    meta:'28 agentes · 10 escritórios virtuais',
    rx:0.30, ry:-0.55, r:0.14, nodes:13 },
  { id:'memory',    name:'RAG & Memória',          brain:'Lobo Temporal + Hipocampo',
    desc:'MEMORY.md + knowledge/ por agente. Embeddings para busca semântica. SOUL.md como identidade permanente. Contexto persistente entre sessões.',
    meta:'28 bases de conhecimento individuais',
    rx:0.08, ry:-0.22, r:0.12, nodes:10 },
  { id:'llm',       name:'Multi-LLM Providers',   brain:'Corpo Caloso',
    desc:'Anthropic (Opus/Sonnet/Haiku), Google Gemini (2.5 Pro/Flash), OpenAI (GPT-4o), Zhipu GLM (4.5 Air/Flash — gratuito). Fallback automático.',
    meta:'25+ modelos · 4 providers · fallback auto',
    rx:0.50, ry:-0.28, r:0.11, nodes:9 },
  { id:'interface', name:'Interface Web',          brain:'Lobo Occipital',
    desc:'openclaw-web-dev (porta 4001) e openclaw-web (4000). Painel de controle, chat com agentes, Kill Switch de gastos e monitoramento em tempo real.',
    meta:'DEV :4001 · PROD :4000',
    rx:0.62, ry: 0.05, r:0.10, nodes:7 },
  { id:'discord',   name:'Bots Discord',           brain:'Córtex Motor',
    desc:'clawdio-sala-geral + bot_prod.js. Chamadas diretas à API Anthropic. Camila Daily Briefing às 10h via Google Calendar.',
    meta:'sala-geral · bot_prod · briefing diário',
    rx:0.20, ry: 0.15, r:0.09, nodes:5 },
];

// Conexões entre hemisférios (cruzadas)
const CROSS_CONNECTIONS = [
  ['router','agents'],['router','llm'],['gateway','llm'],
  ['gateway','agents'],['watchdog','discord'],['billing','agents'],
  ['infra','gateway'],['memory','router'],['interface','router'],
];

// ─── ESTADO ───────────────────────────────────────────────────────────────────
let nodes = [], connections = [], sparks = [];
let hoveredRegion = null;
let sCnt = 0, sPerSec = 0, lastSec = Date.now();

// Posições dos dois hemisférios
function hemPositions() {
  const gap = W * 0.04; // espaço entre os dois
  const sc = Math.min(W * 0.38, H * 0.44);
  const lx = W * 0.5 - sc * 0.55 - gap;
  const rx = W * 0.5 + sc * 0.55 + gap;
  const cy = H * 0.5 + sc * 0.05;
  return { lx, rx, cy, sc };
}

// ─── NÓS ─────────────────────────────────────────────────────────────────────
class Node {
  constructor(x, y, region, isCenter) {
    this.ox = x; this.oy = y; this.x = x; this.y = y;
    this.region = region;
    this.r = isCenter ? 3.2 : 1.2 + Math.random() * 1.6;
    this.phase = Math.random() * Math.PI * 2;
    this.spd = 0.007 + Math.random() * 0.012;
    this.drift = 5 + Math.random() * 9;
    this.da = Math.random() * Math.PI * 2;
    this.ds = 0.002 + Math.random() * 0.004;
    this.alpha = 0.28 + Math.random() * 0.38;
  }
  update() {
    this.phase += this.spd;
    this.da += this.ds;
    this.x = this.ox + Math.cos(this.da) * this.drift;
    this.y = this.oy + Math.sin(this.da * 0.75) * this.drift * 0.7;
  }
  draw(hi) {
    const pulse = 0.7 + Math.sin(this.phase) * 0.3;
    const a = this.alpha * pulse * (hi ? 2.0 : 1);
    const r = this.r * (hi ? 1.7 : 1);

    const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 5.5);
    grd.addColorStop(0, `rgba(210,230,255,${a * 0.28})`);
    grd.addColorStop(1, 'transparent');
    ctx.beginPath(); ctx.arc(this.x, this.y, r * 5.5, 0, Math.PI * 2);
    ctx.fillStyle = grd; ctx.fill();

    ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(225,238,255,${Math.min(a * 1.3, 0.92)})`; ctx.fill();
  }
}

// ─── SINAPSES ─────────────────────────────────────────────────────────────────
class Spark {
  constructor(a, b, cross) {
    this.a = a; this.b = b; this.t = 0;
    this.spd = 0.007 + Math.random() * 0.013;
    this.alive = true; this.cross = cross;
    sCnt++;
  }
  update() { this.t += this.spd; if (this.t >= 1) this.alive = false; }
  draw() {
    const px = this.a.x + (this.b.x - this.a.x) * this.t;
    const py = this.a.y + (this.b.y - this.a.y) * this.t;
    const alpha = Math.sin(this.t * Math.PI);
    const trail = 0.10;
    const tx = this.a.x + (this.b.x - this.a.x) * Math.max(0, this.t - trail);
    const ty = this.a.y + (this.b.y - this.a.y) * Math.max(0, this.t - trail);

    const g = ctx.createLinearGradient(tx, ty, px, py);
    const intensity = this.cross ? 0.75 : 0.55;
    g.addColorStop(0, 'transparent');
    g.addColorStop(1, `rgba(215,232,255,${alpha * intensity})`);
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(px, py);
    ctx.strokeStyle = g;
    ctx.lineWidth = (this.cross ? 1.4 : 1.0) * alpha;
    ctx.stroke();

    ctx.beginPath(); ctx.arc(px, py, (this.cross ? 2.2 : 1.6) * alpha, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(230,242,255,${alpha * (this.cross ? 0.90 : 0.75)})`;
    ctx.fill();
  }
}

// ─── INICIALIZAÇÃO ────────────────────────────────────────────────────────────
function init() {
  nodes = []; connections = []; sparks = [];
  const { lx, rx, cy, sc } = hemPositions();
  const nodeMap = {};

  function buildHem(regions, hemX, flip) {
    regions.forEach(reg => {
      const rcx = hemX + (flip ? -1 : 1) * reg.rx * sc;
      const rcy = cy + reg.ry * sc;
      const spread = sc * reg.r;
      const arr = [];

      for (let i = 0; i < reg.nodes; i++) {
        let nx, ny, tries = 0;
        do {
          const a = Math.random() * Math.PI * 2;
          const d = Math.pow(Math.random(), 0.5) * spread;
          nx = rcx + Math.cos(a) * d;
          ny = rcy + Math.sin(a) * d;
          tries++;
        } while (!insideHem(nx, ny, hemX, cy, sc, flip) && tries < 40);

        const n = new Node(nx, ny, reg, i === 0);
        arr.push(n); nodes.push(n);
      }
      nodeMap[reg.id] = arr;

      // Intra-região
      for (let i = 0; i < arr.length; i++)
        for (let j = i + 1; j < arr.length; j++)
          if (Math.random() < 0.48) connections.push([arr[i], arr[j], false]);
    });
  }

  buildHem(REGIONS_LEFT, lx, false);
  buildHem(REGIONS_RIGHT, rx, true);

  // Conexões cruzadas
  CROSS_CONNECTIONS.forEach(([aId, bId]) => {
    const an = nodeMap[aId], bn = nodeMap[bId];
    if (an && bn) {
      const a = an[Math.floor(Math.random() * an.length)];
      const b = bn[Math.floor(Math.random() * bn.length)];
      connections.push([a, b, true]);
    }
  });
}

function insideHem(x, y, hx, hy, sc, flip) {
  const f = flip ? -1 : 1;
  const dx = (x - hx) * f / sc;
  const dy = (y - hy) / sc;
  // Forma aproximada do cérebro em perfil
  // Oval principal com ajuste para forma de cérebro
  const r = Math.sqrt(dx * dx * 1.8 + dy * dy);
  const angle = Math.atan2(dy, dx);
  const boundary = 0.68 + 0.10 * Math.cos(angle) + 0.05 * Math.cos(2 * angle);
  return r < boundary && dx > -0.28;
}

// ─── DESENHO DO CONTORNO ──────────────────────────────────────────────────────
function drawBrains() {
  const { lx, rx, cy, sc } = hemPositions();

  // Hemisfério esquerdo (virado para a direita — face voltada para o centro)
  drawOneBrain(lx, cy, sc, false);
  // Hemisfério direito (espelhado — face voltada para o centro)
  drawOneBrain(rx, cy, sc, true);

  // Linha de separação central sutil
  ctx.beginPath();
  ctx.moveTo(W * 0.5, cy - sc * 0.85);
  ctx.lineTo(W * 0.5, cy + sc * 0.75);
  ctx.strokeStyle = 'rgba(200,220,255,0.04)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 8]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Labels dos hemisférios
  ctx.save();
  ctx.font = '8px Courier New';
  ctx.letterSpacing = '3px';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(200,220,255,0.18)';
  ctx.fillText('HEMISFÉRIO ESQUERDO', lx, cy - sc * 0.88);
  ctx.fillText('HEMISFÉRIO DIREITO', rx, cy - sc * 0.88);
  ctx.fillStyle = 'rgba(200,220,255,0.10)';
  ctx.font = '7px Courier New';
  ctx.fillText('CONTROLE · LÓGICA · INFRAESTRUTURA', lx, cy - sc * 0.82);
  ctx.fillText('AGENTES · MEMÓRIA · INTERAÇÃO', rx, cy - sc * 0.82);
  ctx.restore();
}

function drawOneBrain(ox, oy, sc, flip) {
  // Glow de fundo
  const grd = ctx.createRadialGradient(ox, oy, sc * 0.1, ox, oy, sc * 0.95);
  grd.addColorStop(0, 'rgba(180,210,255,0.022)');
  grd.addColorStop(0.5, 'rgba(180,210,255,0.010)');
  grd.addColorStop(1, 'transparent');

  ctx.save();
  brainPath(ctx, ox, oy, sc, flip);
  ctx.fillStyle = grd;
  ctx.fill();
  ctx.strokeStyle = 'rgba(200,220,255,0.12)';
  ctx.lineWidth = 1.1;
  ctx.stroke();
  ctx.restore();

  // Sulcos
  ctx.save();
  brainGiros(ctx, ox, oy, sc, flip);
  ctx.restore();
}

// ─── CONEXÕES ESTÁTICAS ───────────────────────────────────────────────────────
function drawConnections() {
  connections.forEach(([a, b, cross]) => {
    const dist = Math.hypot(a.x - b.x, a.y - b.y);
    const maxD = cross ? 999 : 180;
    if (dist > maxD) return;
    const alpha = cross
      ? 0.06
      : (1 - dist / maxD) * 0.09;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    if (cross) {
      // Curva suave para conexões cruzadas
      const mx = (a.x + b.x) / 2;
      const my = (a.y + b.y) / 2 - 30;
      ctx.quadraticCurveTo(mx, my, b.x, b.y);
    } else {
      ctx.lineTo(b.x, b.y);
    }
    ctx.strokeStyle = `rgba(200,220,255,${alpha})`;
    ctx.lineWidth = cross ? 0.6 : 0.4;
    ctx.stroke();
  });
}

// ─── LABELS DAS REGIÕES ───────────────────────────────────────────────────────
function drawRegionLabels() {
  const { lx, rx, cy, sc } = hemPositions();

  [...REGIONS_LEFT, ...REGIONS_RIGHT].forEach(reg => {
    const isLeft = REGIONS_LEFT.includes(reg);
    const hemX = isLeft ? lx : rx;
    const flip = !isLeft;
    const x = hemX + (flip ? -1 : 1) * reg.rx * sc;
    const y = cy + reg.ry * sc;
    const hi = hoveredRegion === reg;

    ctx.save();
    ctx.font = hi ? 'bold 9px Courier New' : '8px Courier New';
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(210,228,255,${hi ? 0.65 : 0.20})`;
    if (hi) { ctx.shadowColor = 'rgba(210,228,255,0.35)'; ctx.shadowBlur = 10; }
    ctx.fillText(reg.name.toUpperCase(), x, y - 18);
    ctx.restore();
  });
}

// ─── LOOP ─────────────────────────────────────────────────────────────────────
let lastSpark = 0;

function loop(ts) {
  requestAnimationFrame(loop);

  ctx.fillStyle = 'rgba(0,0,0,0.16)';
  ctx.fillRect(0, 0, W, H);

  drawBrains();
  drawConnections();

  nodes.forEach(n => {
    n.update();
    n.draw(hoveredRegion && n.region === hoveredRegion);
  });

  // Disparar sinapses — mistura intra e inter-hemisférica
  if (ts - lastSpark > 50 && sparks.length < 55 && Math.random() < 0.78) {
    // 30% chance de sinapse cruzada
    const crossConns = connections.filter(c => c[2]);
    const intraConns = connections.filter(c => !c[2]);
    const useCross = Math.random() < 0.30 && crossConns.length > 0;
    const pool = useCross ? crossConns : intraConns;
    const conn = pool[Math.floor(Math.random() * pool.length)];
    if (conn) {
      const [a, b, cross] = Math.random() < 0.5 ? conn : [conn[1], conn[0], conn[2]];
      sparks.push(new Spark(a, b, cross));
      lastSpark = ts;
    }
  }

  sparks = sparks.filter(s => s.alive);
  sparks.forEach(s => { s.update(); s.draw(); });

  drawRegionLabels();

  const now = Date.now();
  if (now - lastSec >= 1000) {
    sPerSec = sCnt; sCnt = 0; lastSec = now;
    document.getElementById('sv').textContent = sPerSec;
  }
}

// ─── INTERATIVIDADE ───────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const mx = e.clientX, my = e.clientY;
  const { lx, rx, cy, sc } = hemPositions();
  let best = null, bestD = Infinity;

  [...REGIONS_LEFT, ...REGIONS_RIGHT].forEach(reg => {
    const isLeft = REGIONS_LEFT.includes(reg);
    const hemX = isLeft ? lx : rx;
    const flip = !isLeft;
    const x = hemX + (flip ? -1 : 1) * reg.rx * sc;
    const y = cy + reg.ry * sc;
    const d = Math.hypot(mx - x, my - y);
    if (d < sc * 0.16 && d < bestD) { bestD = d; best = reg; }
  });

  hoveredRegion = best;
  const tt = document.getElementById('tooltip');

  if (best) {
    tt.style.opacity = '1';
    document.getElementById('tt-n').textContent = best.name;
    document.getElementById('tt-s').textContent = '↳ ' + best.brain;
    document.getElementById('tt-d').textContent = best.desc;
    document.getElementById('tt-m').textContent = best.meta;
    tt.style.left = (mx + 18) + 'px';
    tt.style.top = (my - 10) + 'px';
    requestAnimationFrame(() => {
      const r = tt.getBoundingClientRect();
      if (r.right > W - 10) tt.style.left = (mx - r.width - 18) + 'px';
      if (r.bottom > H - 10) tt.style.top = (my - r.height) + 'px';
    });
  } else {
    tt.style.opacity = '0';
  }
});

canvas.addEventListener('click', e => {
  if (!hoveredRegion) return;
  const rn = nodes.filter(n => n.region === hoveredRegion);
  for (let i = 0; i < 14; i++) {
    const a = rn[Math.floor(Math.random() * rn.length)];
    const b = nodes[Math.floor(Math.random() * nodes.length)];
    const cross = a && b && REGIONS_LEFT.includes(a.region) !== REGIONS_LEFT.includes(b.region);
    if (a && b && a !== b) sparks.push(new Spark(a, b, cross));
  }
});

init();
loop(0);
</script>
