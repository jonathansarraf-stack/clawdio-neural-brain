// Conexões cruzadas entre hemisférios
const CROSS = [
  ['frontal','frontal_r'],['frontal','parietal_r'],
  ['parietal','parietal_r'],['temporal','temporal_r'],

// ─── ESTADO ───────────────────────────────────────────────────────────────────
let nodes = [], connections = [], sparks = [];
let hoveredLobe = null;
let sCnt = 0, sPerSec = 0, lastSec = Date.now();

function hemCenters() {
  const sc = Math.min(W * 0.36, H * 0.42);
  const gap = sc * 0.18;
  const lx = W * 0.5 - sc * 0.52 - gap;
  const rx = W * 0.5 + sc * 0.52 + gap;
  const cy = H * 0.5 + sc * 0.06;
  return { lx, rx, cy, sc };
}

// ─── NÓ ───────────────────────────────────────────────────────────────────────
class Node {
  constructor(x, y, lobe, big) {
    this.ox = x; this.oy = y; this.x = x; this.y = y;
    this.lobe = lobe;
    this.r = big ? 3.0 : 1.1 + Math.random() * 1.5;
    this.phase = Math.random() * Math.PI * 2;
    this.spd = 0.007 + Math.random() * 0.011;
    this.drift = 4 + Math.random() * 8;
    this.da = Math.random() * Math.PI * 2;
    this.ds = 0.002 + Math.random() * 0.004;
    this.alpha = 0.25 + Math.random() * 0.35;
  }
  update() {
    this.phase += this.spd; this.da += this.ds;
    this.x = this.ox + Math.cos(this.da) * this.drift;
    this.y = this.oy + Math.sin(this.da * 0.75) * this.drift * 0.7;
  }
  draw(hi) {
    const p = 0.7 + Math.sin(this.phase) * 0.3;
    const a = this.alpha * p * (hi ? 2.2 : 1);
    const r = this.r * (hi ? 1.8 : 1);
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 5.5);
    g.addColorStop(0, `rgba(215,232,255,${a * 0.30})`);
    g.addColorStop(1, 'transparent');
    ctx.beginPath(); ctx.arc(this.x, this.y, r * 5.5, 0, Math.PI*2); ctx.fillStyle = g; ctx.fill();
    ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(228,240,255,${Math.min(a*1.3,0.92)})`; ctx.fill();
  }
}

// ─── SINAPSE ──────────────────────────────────────────────────────────────────
class Spark {
  constructor(a, b, cross) {
    this.a = a; this.b = b; this.t = 0;
    this.spd = 0.006 + Math.random() * 0.012;
    this.alive = true; this.cross = cross; sCnt++;
  }
  update() { this.t += this.spd; if (this.t >= 1) this.alive = false; }
  draw() {
    const px = this.a.x + (this.b.x - this.a.x) * this.t;
    const py = this.a.y + (this.b.y - this.a.y) * this.t;
    const al = Math.sin(this.t * Math.PI);
    const trail = 0.09;
    const tx = this.a.x + (this.b.x - this.a.x) * Math.max(0, this.t - trail);
    const ty = this.a.y + (this.b.y - this.a.y) * Math.max(0, this.t - trail);
    const g = ctx.createLinearGradient(tx, ty, px, py);
    g.addColorStop(0, 'transparent');
    g.addColorStop(1, `rgba(218,235,255,${al * (this.cross ? 0.72 : 0.52)})`);
    ctx.beginPath(); ctx.moveTo(tx, ty);
    if (this.cross) {
      const mx = (tx + px) / 2, my = Math.min(ty, py) - 25;
      ctx.quadraticCurveTo(mx, my, px, py);
    } else { ctx.lineTo(px, py); }
    ctx.strokeStyle = g; ctx.lineWidth = (this.cross ? 1.3 : 0.9) * al; ctx.stroke();
    ctx.beginPath(); ctx.arc(px, py, (this.cross ? 2.0 : 1.5) * al, 0, Math.PI*2);
    ctx.fillStyle = `rgba(230,242,255,${al * (this.cross ? 0.88 : 0.72)})`; ctx.fill();
  }
}

// ─── DESENHO ANATÔMICO DO CÉREBRO ─────────────────────────────────────────────
function drawBrainAnatomy(hx, hy, sc, flip, lobes) {
  const f = flip ? -1 : 1;

  // Contorno externo do cérebro completo
  ctx.save();
  ctx.translate(hx, hy);
  ctx.scale(f, 1);

  // Silhueta principal do hemisfério (perfil lateral)
  ctx.beginPath();
  ctx.moveTo(sc*0.0,  -sc*0.72);
  ctx.bezierCurveTo( sc*0.22,-sc*0.84,  sc*0.48,-sc*0.82,  sc*0.62,-sc*0.65);
  ctx.bezierCurveTo( sc*0.74,-sc*0.48,  sc*0.76,-sc*0.28,  sc*0.72, sc*0.02);
  ctx.bezierCurveTo( sc*0.68, sc*0.22,  sc*0.56, sc*0.40,  sc*0.42, sc*0.48);
  ctx.bezierCurveTo( sc*0.28, sc*0.56,  sc*0.10, sc*0.62, -sc*0.02, sc*0.62);
  ctx.bezierCurveTo(-sc*0.12, sc*0.62, -sc*0.18, sc*0.54, -sc*0.16, sc*0.44);
  ctx.bezierCurveTo(-sc*0.14, sc*0.34, -sc*0.06, sc*0.26,  sc*0.02, sc*0.18);
  ctx.bezierCurveTo( sc*0.06, sc*0.10,  sc*0.04,-sc*0.02,  sc*0.00,-sc*0.14);
  ctx.bezierCurveTo(-sc*0.04,-sc*0.28, -sc*0.06,-sc*0.48,  sc*0.00,-sc*0.72);
  ctx.closePath();

  // Glow de fundo
  const grd = ctx.createRadialGradient(sc*0.2, -sc*0.1, sc*0.05, sc*0.2, -sc*0.1, sc*0.85);
  grd.addColorStop(0, 'rgba(180,210,255,0.025)');
  grd.addColorStop(0.6, 'rgba(180,210,255,0.010)');
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd; ctx.fill();
  ctx.strokeStyle = 'rgba(200,222,255,0.14)'; ctx.lineWidth = 1.2; ctx.stroke();

  // ─── SULCO CENTRAL (Sulco de Rolando) ─────────────────────────────────────
  ctx.beginPath();
  ctx.moveTo(sc*0.34, -sc*0.78);
  ctx.bezierCurveTo(sc*0.30, -sc*0.55, sc*0.26, -sc*0.32, sc*0.18, -sc*0.10);
  ctx.strokeStyle = 'rgba(200,222,255,0.10)'; ctx.lineWidth = 1.0; ctx.stroke();

  // ─── SULCO LATERAL (Sulco de Sylvius) ─────────────────────────────────────
  ctx.beginPath();
  ctx.moveTo(sc*0.02, -sc*0.38);
  ctx.bezierCurveTo(sc*0.16, -sc*0.35, sc*0.34, -sc*0.28, sc*0.52, -sc*0.22);
  ctx.strokeStyle = 'rgba(200,222,255,0.10)'; ctx.lineWidth = 1.0; ctx.stroke();

  // ─── SULCO PARIETO-OCCIPITAL ───────────────────────────────────────────────
  ctx.beginPath();
  ctx.moveTo(sc*0.58, -sc*0.48);
  ctx.bezierCurveTo(sc*0.64, -sc*0.30, sc*0.66, -sc*0.10, sc*0.64, sc*0.08);
  ctx.strokeStyle = 'rgba(200,222,255,0.08)'; ctx.lineWidth = 0.8; ctx.stroke();

  // ─── GIROS FRONTAIS ───────────────────────────────────────────────────────
  const giros = [
    // Frontal superior
    [[sc*0.08,-sc*0.76],[sc*0.20,-sc*0.72],[sc*0.30,-sc*0.64]],
    // Frontal médio
    [[sc*0.06,-sc*0.60],[sc*0.18,-sc*0.56],[sc*0.28,-sc*0.50]],
    // Frontal inferior
    [[sc*0.04,-sc*0.46],[sc*0.14,-sc*0.42],[sc*0.24,-sc*0.36]],
    // Parietal superior
    [[sc*0.38,-sc*0.68],[sc*0.50,-sc*0.60],[sc*0.60,-sc*0.48]],
    // Parietal inferior
    [[sc*0.36,-sc*0.50],[sc*0.46,-sc*0.42],[sc*0.56,-sc*0.30]],
    // Temporal superior
    [[sc*0.08,-sc*0.22],[sc*0.24,-sc*0.18],[sc*0.42,-sc*0.14]],
    // Temporal médio
    [[sc*0.06,-sc*0.06],[sc*0.22,-sc*0.02],[sc*0.38, sc*0.04]],
    // Temporal inferior
    [[sc*0.04, sc*0.10],[sc*0.18, sc*0.14],[sc*0.32, sc*0.18]],
    // Occipital
    [[sc*0.58, sc*0.02],[sc*0.64, sc*0.14],[sc*0.62, sc*0.28]],
    // Cerebelo (lamelas)
    [[sc*0.08, sc*0.44],[sc*0.20, sc*0.50],[sc*0.34, sc*0.52]],
    [[sc*0.06, sc*0.52],[sc*0.18, sc*0.58],[sc*0.30, sc*0.60]],
    [[-sc*0.04, sc*0.36],[sc*0.04, sc*0.42],[sc*0.12, sc*0.46]],
  ];

  giros.forEach(pts => {
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    ctx.quadraticCurveTo(pts[1][0], pts[1][1], pts[2][0], pts[2][1]);
    ctx.strokeStyle = 'rgba(200,222,255,0.055)'; ctx.lineWidth = 0.7; ctx.stroke();
  });

  // ─── CEREBELO (contorno separado) ─────────────────────────────────────────
  ctx.beginPath();
  ctx.moveTo(sc*0.04, sc*0.40);
  ctx.bezierCurveTo(sc*0.14, sc*0.36, sc*0.30, sc*0.36, sc*0.44, sc*0.42);
  ctx.bezierCurveTo(sc*0.54, sc*0.48, sc*0.56, sc*0.58, sc*0.48, sc*0.66);
  ctx.bezierCurveTo(sc*0.38, sc*0.72, sc*0.20, sc*0.72, sc*0.08, sc*0.66);
  ctx.bezierCurveTo(-sc*0.02, sc*0.60, -sc*0.04, sc*0.50, sc*0.04, sc*0.40);
  ctx.closePath();
  ctx.strokeStyle = 'rgba(200,222,255,0.10)'; ctx.lineWidth = 0.9; ctx.stroke();

  // ─── TRONCO ENCEFÁLICO ────────────────────────────────────────────────────
  ctx.beginPath();
  ctx.moveTo(sc*0.00, sc*0.18);
  ctx.bezierCurveTo(-sc*0.06, sc*0.26, -sc*0.10, sc*0.38, -sc*0.08, sc*0.50);
  ctx.bezierCurveTo(-sc*0.06, sc*0.60, sc*0.00, sc*0.66, sc*0.06, sc*0.64);
  ctx.bezierCurveTo(sc*0.10, sc*0.62, sc*0.10, sc*0.52, sc*0.06, sc*0.42);
  ctx.bezierCurveTo(sc*0.04, sc*0.32, sc*0.04, sc*0.22, sc*0.00, sc*0.18);
  ctx.closePath();
  ctx.strokeStyle = 'rgba(200,222,255,0.09)'; ctx.lineWidth = 0.8; ctx.stroke();

  ctx.restore();

  // ─── LABELS ANATÔMICOS ────────────────────────────────────────────────────
  const labelPositions = [
    { name: 'LOBO FRONTAL',    x: hx + f * sc * 0.14, y: hy - sc * 0.62 },
    { name: 'LOBO PARIETAL',   x: hx + f * sc * 0.48, y: hy - sc * 0.58 },
    { name: 'LOBO TEMPORAL',   x: hx + f * sc * 0.20, y: hy + sc * 0.02 },
    { name: 'LOBO OCCIPITAL',  x: hx + f * sc * 0.62, y: hy + sc * 0.08 },
    { name: 'CEREBELO',        x: hx + f * sc * 0.28, y: hy + sc * 0.58 },
    { name: 'TRONCO',          x: hx + f * sc * (-0.06), y: hy + sc * 0.52 },
  ];

  labelPositions.forEach(lp => {
    ctx.save();
    ctx.font = '7px Courier New';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(200,222,255,0.16)';
    ctx.fillText(lp.name, lp.x, lp.y);
    ctx.restore();
  });
}

// ─── INICIALIZAÇÃO ────────────────────────────────────────────────────────────
function init() {
  nodes = []; connections = []; sparks = [];
  const { lx, rx, cy, sc } = hemCenters();
  const nodeMap = {};

  function buildNodes(lobes, hx, flip) {
    const f = flip ? -1 : 1;
    lobes.forEach(lobe => {
      const rcx = hx + f * lobe.cx * sc;
      const rcy = cy + lobe.cy * sc;
      const spread = sc * lobe.r * 0.65;
      const arr = [];
      for (let i = 0; i < lobe.nodes; i++) {
        let nx, ny, tries = 0;
        do {
          const a = Math.random() * Math.PI * 2;
          const d = Math.pow(Math.random(), 0.5) * spread;
          nx = rcx + Math.cos(a) * d;
          ny = rcy + Math.sin(a) * d;
          tries++;
        } while (!insideHem(nx, ny, hx, cy, sc, flip) && tries < 40);
        arr.push(new Node(nx, ny, lobe, i === 0));
        nodes.push(arr[arr.length - 1]);
      }
      nodeMap[lobe.id] = arr;
      for (let i = 0; i < arr.length; i++)
        for (let j = i + 1; j < arr.length; j++)
          if (Math.random() < 0.50) connections.push([arr[i], arr[j], false]);
    });
  }

  buildNodes(LOBES, lx, false);
  buildNodes(LOBES_RIGHT, rx, true);

  CROSS.forEach(([a, b]) => {
    const an = nodeMap[a], bn = nodeMap[b];
    if (an && bn) {
      const na = an[Math.floor(Math.random() * an.length)];
      const nb = bn[Math.floor(Math.random() * bn.length)];
      connections.push([na, nb, true]);
    }
  });
}

function insideHem(x, y, hx, hy, sc, flip) {
  const f = flip ? -1 : 1;
  const dx = (x - hx) * f / sc;
  const dy = (y - hy) / sc;
  // Forma aproximada do hemisfério em perfil
  if (dx < -0.20 || dx > 0.78) return false;
  if (dy < -0.82 || dy > 0.68) return false;
  const r = Math.sqrt(dx * dx * 1.6 + dy * dy);
  return r < 0.80;
}

// ─── CONEXÕES ─────────────────────────────────────────────────────────────────
function drawConnections() {
  connections.forEach(([a, b, cross]) => {
    const dist = Math.hypot(a.x - b.x, a.y - b.y);
    if (!cross && dist > 170) return;
    const alpha = cross ? 0.055 : (1 - dist / 170) * 0.085;
    ctx.beginPath(); ctx.moveTo(a.x, a.y);
    if (cross) {
      const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2 - 20;
      ctx.quadraticCurveTo(mx, my, b.x, b.y);
    } else { ctx.lineTo(b.x, b.y); }
    ctx.strokeStyle = `rgba(200,222,255,${alpha})`;
    ctx.lineWidth = cross ? 0.5 : 0.4; ctx.stroke();
  });
}

// ─── LABELS DE SISTEMA ────────────────────────────────────────────────────────
function drawSystemLabels() {
  const { lx, rx, cy, sc } = hemCenters();
  const allLobes = [...LOBES.map(l => ({...l, hx: lx, flip: false})),
                    ...LOBES_RIGHT.map(l => ({...l, hx: rx, flip: true}))];

  allLobes.forEach(lobe => {
    const f = lobe.flip ? -1 : 1;
    const x = lobe.hx + f * lobe.cx * sc;
    const y = cy + lobe.cy * sc;
    const hi = hoveredLobe === lobe;
    if (!hi) return; // só mostra label no hover para não poluir

    ctx.save();
    ctx.font = 'bold 9px Courier New';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(220,236,255,0.70)';
    ctx.shadowColor = 'rgba(200,222,255,0.40)'; ctx.shadowBlur = 12;
    ctx.fillText(lobe.system.toUpperCase(), x, y - 22);
    ctx.restore();
  });
}

// ─── HEADER DOS HEMISFÉRIOS ───────────────────────────────────────────────────
function drawHemHeaders() {
  const { lx, rx, cy, sc } = hemCenters();
  ctx.save();
  ctx.font = '8px Courier New';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(200,222,255,0.20)';
  ctx.fillText('HEMISFÉRIO ESQUERDO', lx, cy - sc * 0.90);
  ctx.fillText('HEMISFÉRIO DIREITO', rx, cy - sc * 0.90);
  ctx.font = '7px Courier New';
  ctx.fillStyle = 'rgba(200,222,255,0.10)';
  ctx.fillText('CONTROLE · LÓGICA · INFRAESTRUTURA', lx, cy - sc * 0.84);
  ctx.fillText('AGENTES · MEMÓRIA · INTERAÇÃO', rx, cy - sc * 0.84);

  // Linha divisória central
  ctx.beginPath();
  ctx.moveTo(W * 0.5, cy - sc * 0.88);
  ctx.lineTo(W * 0.5, cy + sc * 0.72);
  ctx.strokeStyle = 'rgba(200,222,255,0.04)';
  ctx.lineWidth = 1; ctx.setLineDash([3, 8]); ctx.stroke(); ctx.setLineDash([]);
  ctx.restore();
}

// ─── LOOP ─────────────────────────────────────────────────────────────────────
let lastSpark = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  ctx.fillStyle = 'rgba(0,0,0,0.16)'; ctx.fillRect(0, 0, W, H);

  const { lx, rx, cy, sc } = hemCenters();
  drawHemHeaders();
  drawBrainAnatomy(lx, cy, sc, false, LOBES);
  drawBrainAnatomy(rx, cy, sc, true, LOBES_RIGHT);
  drawConnections();

  nodes.forEach(n => { n.update(); n.draw(hoveredLobe && n.lobe === hoveredLobe); });

  if (ts - lastSpark > 52 && sparks.length < 55 && Math.random() < 0.76) {
    const crossC = connections.filter(c => c[2]);
    const intraC = connections.filter(c => !c[2]);
    const useCross = Math.random() < 0.28 && crossC.length > 0;
    const pool = useCross ? crossC : intraC;
    const conn = pool[Math.floor(Math.random() * pool.length)];
    if (conn) {
      const [a, b, cross] = Math.random() < 0.5 ? conn : [conn[1], conn[0], conn[2]];
      sparks.push(new Spark(a, b, cross)); lastSpark = ts;
    }
  }
  sparks = sparks.filter(s => s.alive);
  sparks.forEach(s => { s.update(); s.draw(); });
  drawSystemLabels();

  const now = Date.now();
  if (now - lastSec >= 1000) {
    sPerSec = sCnt; sCnt = 0; lastSec = now;
    document.getElementById('sv').textContent = sPerSec;
  }
}

// ─── INTERATIVIDADE ───────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const mx = e.clientX, my = e.clientY;
  const { lx, rx, cy, sc } = hemCenters();
  let best = null, bestD = Infinity;

  const allLobes = [...LOBES.map(l => ({...l, hx: lx, flip: false})),
                    ...LOBES_RIGHT.map(l => ({...l, hx: rx, flip: true}))];

  allLobes.forEach(lobe => {
    const f = lobe.flip ? -1 : 1;
    const x = lobe.hx + f * lobe.cx * sc;
    const y = cy + lobe.cy * sc;
    const d = Math.hypot(mx - x, my - y);
    if (d < sc * 0.22 && d < bestD) { bestD = d; best = lobe; }
  });

  hoveredLobe = best;
  const tt = document.getElementById('tooltip');
  if (best) {
    tt.style.opacity = '1';
    document.getElementById('tt-n').textContent = best.system;
    document.getElementById('tt-l').textContent = '↳ ' + best.brain;
    document.getElementById('tt-d').textContent = best.desc;
    document.getElementById('tt-m').textContent = best.meta;
    tt.style.left = (mx + 18) + 'px'; tt.style.top = (my - 10) + 'px';
    requestAnimationFrame(() => {
      const r = tt.getBoundingClientRect();
      if (r.right > W - 10) tt.style.left = (mx - r.width - 18) + 'px';
      if (r.bottom > H - 10) tt.style.top = (my - r.height) + 'px';
    });
  } else { tt.style.opacity = '0'; }
});

canvas.addEventListener('click', e => {
  if (!hoveredLobe) return;
  const rn = nodes.filter(n => n.lobe === hoveredLobe);
  for (let i = 0; i < 14; i++) {
    const a = rn[Math.floor(Math.random() * rn.length)];
    const b = nodes[Math.floor(Math.random() * nodes.length)];
    if (a && b && a !== b) {
      const cross = LOBES.includes(a.lobe) !== LOBES.includes(b.lobe);
      sparks.push(new Spark(a, b, cross));
    }
  }
});

init(); loop(0);
</script>
