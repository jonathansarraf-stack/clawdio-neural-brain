<title>Clawdio — Neural Architecture</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;width:100vw;height:100vh}

#header{position:fixed;top:18px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;z-index:20}
#header h1{font-size:11px;letter-spacing:7px;color:rgba(210,228,255,.32);text-transform:uppercase}
#header p{font-size:8px;letter-spacing:3px;color:rgba(210,228,255,.12);margin-top:4px;text-transform:uppercase}

#scene{position:fixed;top:0;left:0;width:100%;height:100%}
#ov{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}

/* Imagens do cérebro */
.brain-img{position:absolute;pointer-events:none;
  filter: brightness(0.28) contrast(1.4) saturate(0) sepia(0.2);
  transition: filter 0.3s}
.brain-img.hovered{filter: brightness(0.38) contrast(1.5) saturate(0) sepia(0.3) drop-shadow(0 0 18px rgba(180,210,255,0.25))}

/* Labels dos hemisférios */
.hem-label{position:absolute;text-align:center;pointer-events:none}
.hem-label h2{font-size:8px;letter-spacing:5px;color:rgba(210,228,255,.22);text-transform:uppercase}
.hem-label p{font-size:7px;letter-spacing:2px;color:rgba(210,228,255,.10);margin-top:3px;text-transform:uppercase}

/* Tooltip */
#tooltip{position:fixed;background:rgba(0,0,0,.94);border:1px solid rgba(200,220,255,.10);
  border-radius:6px;padding:12px 15px;max-width:260px;pointer-events:none;
  opacity:0;transition:opacity .15s;z-index:40;backdrop-filter:blur(12px)}
#tooltip h3{font-size:10px;color:rgba(220,235,255,.80);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
#tooltip .lobe{font-size:8px;color:rgba(220,235,255,.28);letter-spacing:1px;margin-bottom:6px;font-style:italic}
#tooltip p{font-size:10px;color:rgba(220,235,255,.50);line-height:1.6}
#tooltip .hint{margin-top:7px;font-size:8px;color:rgba(220,235,255,.20);letter-spacing:1px}

/* Drill-down */
#drill{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.96);
  display:none;z-index:50;overflow:hidden}
#drill.open{display:flex;flex-direction:column}
#drill-header{padding:24px 32px 0;display:flex;align-items:flex-start;justify-content:space-between}
#drill-title{font-size:13px;letter-spacing:5px;color:rgba(220,235,255,.70);text-transform:uppercase}
#drill-sub{font-size:9px;letter-spacing:2px;color:rgba(220,235,255,.22);margin-top:5px;text-transform:uppercase}
#drill-close{font-size:11px;letter-spacing:2px;color:rgba(220,235,255,.28);cursor:pointer;
  padding:4px 10px;border:1px solid rgba(220,235,255,.10);border-radius:3px;
  transition:all .2s;white-space:nowrap;margin-left:20px}
#drill-close:hover{color:rgba(220,235,255,.70);border-color:rgba(220,235,255,.30)}
#drill-body{flex:1;display:grid;grid-template-columns:1fr 1fr;overflow:hidden}
#drill-canvas-wrap{display:flex;align-items:center;justify-content:center;padding:20px}
#drill-info{padding:28px 32px 28px 20px;overflow-y:auto;display:flex;flex-direction:column;
  gap:14px;border-left:1px solid rgba(220,235,255,.05)}
.di-section{border-bottom:1px solid rgba(220,235,255,.05);padding-bottom:12px}
.di-label{font-size:8px;letter-spacing:2px;color:rgba(220,235,255,.22);text-transform:uppercase;margin-bottom:5px}
.di-value{font-size:10px;color:rgba(220,235,255,.55);line-height:1.7}
.di-tag{display:inline-block;font-size:8px;padding:2px 7px;border:1px solid rgba(220,235,255,.12);
  border-radius:2px;color:rgba(220,235,255,.35);margin:2px;letter-spacing:1px}
.di-metric{display:flex;justify-content:space-between;align-items:center;
  padding:4px 0;border-bottom:1px solid rgba(220,235,255,.04)}
.di-metric span:first-child{font-size:9px;color:rgba(220,235,255,.28);letter-spacing:1px}
.di-metric span:last-child{font-size:10px;color:rgba(220,235,255,.55)}
#drill-pulse{width:5px;height:5px;border-radius:50%;background:rgba(220,235,255,.35);
  animation:pulse 1.8s ease-in-out infinite;display:inline-block;margin-right:8px;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.15}}

/* Stats */
#stats{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  display:flex;gap:32px;pointer-events:none;z-index:20}
.sv{font-size:16px;color:rgba(220,235,255,.40);font-weight:bold;text-align:center}
.sl{font-size:7px;color:rgba(220,235,255,.14);letter-spacing:2px;text-transform:uppercase;margin-top:2px;text-align:center}
#live{position:fixed;bottom:18px;right:18px;display:flex;align-items:center;gap:6px;pointer-events:none;z-index:20}
#dot{width:4px;height:4px;border-radius:50%;background:rgba(220,235,255,.28);animation:pulse 2.2s ease-in-out infinite}
#live span{font-size:7px;letter-spacing:2px;color:rgba(220,235,255,.14);text-transform:uppercase}

/* Região clicável overlay */
.lobe-zone{position:absolute;border-radius:50%;cursor:pointer;z-index:10;
  background:transparent;transition:background 0.2s}
.lobe-zone:hover{background:rgba(200,220,255,0.04)}

let W = window.innerWidth, H = window.innerHeight;
const ovC = document.getElementById('ov');
const ctx = ovC.getContext('2d');
ovC.width = W; ovC.height = H;

const scene = document.getElementById('scene');

// Tamanho de cada cérebro
function getBrainSize(){
  const bH = Math.min(H * 0.72, W * 0.38);
  const bW = bH * 0.92;
  const gap = W * 0.025;
  const totalW = bW * 2 + gap;
  const startX = (W - totalW) / 2;
  const startY = (H - bH) / 2 + H * 0.02;
  return {
    bW, bH, gap,
    L: { x: startX, y: startY },
    R: { x: startX + bW + gap, y: startY }
  };
}

// CRIA ELEMENTOS HTML PARA AS IMAGENS
// ═══════════════════════════════════════════════════════════════════════
let imgL, imgR, labelL, labelR;

function buildScene(){
  scene.innerHTML = '';
  const s = getBrainSize();

  // Imagem hemisfério esquerdo (espelhada)
  imgL = document.createElement('img');
  imgL.src = 'brain_flipped.png'; // espelhada: frontal à direita (centro)
  imgL.className = 'brain-img';
  imgL.style.cssText = `left:${s.L.x}px;top:${s.L.y}px;width:${s.bW}px;height:${s.bH}px;`;
  scene.appendChild(imgL);

  // Imagem hemisfério direito (normal)
  imgR = document.createElement('img');
  imgR.src = 'brain_clean.png'; // normal: frontal à esquerda (centro)
  imgR.className = 'brain-img';
  imgR.style.cssText = `left:${s.R.x}px;top:${s.R.y}px;width:${s.bW}px;height:${s.bH}px;`;
  scene.appendChild(imgR);

  // Labels
  labelL = document.createElement('div');
  labelL.className = 'hem-label';
  labelL.innerHTML = '<h2>Hemisfério Esquerdo</h2><p>Controle · Lógica · Infraestrutura</p>';
  labelL.style.cssText = `left:${s.L.x}px;top:${s.L.y - 32}px;width:${s.bW}px;`;
  scene.appendChild(labelL);

  labelR = document.createElement('div');
  labelR.className = 'hem-label';
  labelR.innerHTML = '<h2>Hemisfério Direito</h2><p>Agentes · Memória · Interação</p>';
  labelR.style.cssText = `left:${s.R.x}px;top:${s.R.y - 32}px;width:${s.bW}px;`;
  scene.appendChild(labelR);

  // Linha divisória
  const div = document.createElement('div');
  div.style.cssText = `position:absolute;left:${W/2 - 0.5}px;top:${s.L.y - 15}px;
    width:1px;height:${s.bH + 30}px;background:rgba(200,218,255,0.04);`;
  scene.appendChild(div);
}

// ═══════════════════════════════════════════════════════════════════════
// NÓS E SINAPSES
// ═══════════════════════════════════════════════════════════════════════
let nodes = [], connections = [], sparks = [];
let hoveredLobe = null;
let sCnt = 0, sPerSec = 0, lastSec = Date.now();

class Node {
  constructor(x, y, lobe, big){
    this.ox=x; this.oy=y; this.x=x; this.y=y; this.lobe=lobe;
    this.r = big ? 3.2 : 1.0 + Math.random()*1.8;
    this.phase = Math.random()*Math.PI*2;
    this.spd = 0.006 + Math.random()*0.010;
    this.drift = 2 + Math.random()*6;
    this.da = Math.random()*Math.PI*2;
    this.ds = 0.002 + Math.random()*0.004;
    this.alpha = 0.22 + Math.random()*0.32;
  }
  update(){
    this.phase += this.spd; this.da += this.ds;
    this.x = this.ox + Math.cos(this.da)*this.drift;
    this.y = this.oy + Math.sin(this.da*0.7)*this.drift*0.7;
  }
  draw(hi){
    const pulse = 0.7 + Math.sin(this.phase)*0.3;
    const a = this.alpha * pulse * (hi ? 2.4 : 1);
    const r = this.r * (hi ? 2.0 : 1);
    const g = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,r*6);
    g.addColorStop(0, `rgba(215,232,255,${a*0.28})`);
    g.addColorStop(1, 'transparent');
    ctx.beginPath(); ctx.arc(this.x,this.y,r*6,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    ctx.beginPath(); ctx.arc(this.x,this.y,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(230,244,255,${Math.min(a*1.4,0.95)})`; ctx.fill();
  }
}

class Spark {
  constructor(a, b, cross){
    this.a=a; this.b=b; this.t=0;
    this.spd = 0.005 + Math.random()*0.011;
    this.alive=true; this.cross=cross; sCnt++;
  }
  update(){ this.t += this.spd; if(this.t>=1) this.alive=false; }
  draw(){
    const px2 = this.a.x + (this.b.x-this.a.x)*this.t;
    const py2 = this.a.y + (this.b.y-this.a.y)*this.t;
    const al = Math.sin(this.t*Math.PI);
    const tr = 0.08;
    const tx = this.a.x + (this.b.x-this.a.x)*Math.max(0,this.t-tr);
    const ty = this.a.y + (this.b.y-this.a.y)*Math.max(0,this.t-tr);
    const g = ctx.createLinearGradient(tx,ty,px2,py2);
    g.addColorStop(0,'transparent');
    g.addColorStop(1,`rgba(220,238,255,${al*(this.cross?0.72:0.50)})`);
    ctx.beginPath(); ctx.moveTo(tx,ty);
    if(this.cross){
      const mx=(tx+px2)/2, my=Math.min(ty,py2)-20;
      ctx.quadraticCurveTo(mx,my,px2,py2);
    } else { ctx.lineTo(px2,py2); }
    ctx.strokeStyle=g; ctx.lineWidth=(this.cross?1.4:0.9)*al; ctx.stroke();
    ctx.beginPath(); ctx.arc(px2,py2,(this.cross?2.2:1.6)*al,0,Math.PI*2);
    ctx.fillStyle=`rgba(235,246,255,${al*(this.cross?0.90:0.74)})`; ctx.fill();
  }
}

const nodeMap = {};

function initNodes(){
  nodes=[]; connections=[]; sparks=[];
  const s = getBrainSize();

  LOBES.forEach(lobe => {
    const b = lobe.side==='L' ? s.L : s.R;
    const cx = b.x + lobe.rx * s.bW;
    const cy = b.y + lobe.ry * s.bH;
    const spread = Math.min(s.bW, s.bH) * 0.08;
    const arr = [];
    for(let i=0; i<lobe.nodes; i++){
      const a = Math.random()*Math.PI*2;
      const d = Math.pow(Math.random(),0.5)*spread;
      arr.push(new Node(cx+Math.cos(a)*d, cy+Math.sin(a)*d, lobe, i===0));
      nodes.push(arr[arr.length-1]);
    }
    nodeMap[lobe.id] = arr;
    for(let i=0;i<arr.length;i++)
      for(let j=i+1;j<arr.length;j++)
        if(Math.random()<0.45) connections.push([arr[i],arr[j],false]);
  });

  // Conexões cruzadas
  [['frontal','frontal_r'],['frontal','parietal_r'],['parietal','parietal_r'],
   ['temporal','temporal_r'],['occipital','occipital_r'],['cerebellum','cerebellum_r'],
   ['brainstem','brainstem_r'],['temporal','frontal_r']
  ].forEach(([a,b])=>{
    const an=nodeMap[a], bn=nodeMap[b];
    if(an&&bn){
      const na=an[Math.floor(Math.random()*an.length)];
      const nb=bn[Math.floor(Math.random()*bn.length)];
      connections.push([na,nb,true]);
    }
  });
}

function drawConnections(){
  connections.forEach(([a,b,cross])=>{
    const dist = Math.hypot(a.x-b.x, a.y-b.y);
    if(!cross && dist>150) return;
    const alpha = cross ? 0.04 : (1-dist/150)*0.07;
    ctx.beginPath(); ctx.moveTo(a.x,a.y);
    if(cross){
      const mx=(a.x+b.x)/2, my=(a.y+b.y)/2-16;
      ctx.quadraticCurveTo(mx,my,b.x,b.y);
    } else { ctx.lineTo(b.x,b.y); }
    ctx.strokeStyle=`rgba(200,220,255,${alpha})`;
    ctx.lineWidth=cross?0.5:0.4; ctx.stroke();
  });
}

// ═══════════════════════════════════════════════════════════════════════
// LOOP
// ═══════════════════════════════════════════════════════════════════════
let lastSpark=0;
function loop(ts){
  requestAnimationFrame(loop);
  ctx.clearRect(0,0,W,H);
  drawConnections();
  nodes.forEach(n=>{ n.update(); n.draw(hoveredLobe && n.lobe===hoveredLobe); });

  if(ts-lastSpark>55 && sparks.length<55 && Math.random()<0.80){
    const crossC = connections.filter(c=>c[2]);
    const intraC = connections.filter(c=>!c[2]);
    const useCross = Math.random()<0.25 && crossC.length>0;
    const pool = useCross ? crossC : intraC;
    const conn = pool[Math.floor(Math.random()*pool.length)];
    if(conn){
      const [a,b,cross] = Math.random()<0.5 ? conn : [conn[1],conn[0],conn[2]];
      sparks.push(new Spark(a,b,cross)); lastSpark=ts;
    }
  }
  sparks = sparks.filter(s=>s.alive);
  sparks.forEach(s=>{ s.update(); s.draw(); });

  const now=Date.now();
  if(now-lastSec>=1000){
    sPerSec=sCnt; sCnt=0; lastSec=now;
    document.getElementById('sv').textContent=sPerSec;
  }
}

// ═══════════════════════════════════════════════════════════════════════
// HOVER & CLICK
// ═══════════════════════════════════════════════════════════════════════
function getLobe(mx, my){
  const s = getBrainSize();
  let best=null, bestD=Infinity;
  LOBES.forEach(lobe=>{
    const b = lobe.side==='L' ? s.L : s.R;
    const cx = b.x + lobe.rx * s.bW;
    const cy = b.y + lobe.ry * s.bH;
    const d = Math.hypot(mx-cx, my-cy);
    const thresh = Math.min(s.bW, s.bH) * 0.13;
    if(d<thresh && d<bestD){ bestD=d; best=lobe; }
  });
  return best;
}

document.addEventListener('mousemove', e=>{
  const best = getLobe(e.clientX, e.clientY);
  hoveredLobe = best;
  imgL.classList.toggle('hovered', best && best.side==='L');
  imgR.classList.toggle('hovered', best && best.side==='R');
  const tt = document.getElementById('tooltip');
  if(best){
    tt.style.opacity='1';
    document.getElementById('tt-n').textContent = best.system;
    document.getElementById('tt-l').textContent = '↳ '+best.brain;
    document.getElementById('tt-d').textContent = best.desc;
    tt.style.left=(e.clientX+18)+'px'; tt.style.top=(e.clientY-10)+'px';
    requestAnimationFrame(()=>{
      const r=tt.getBoundingClientRect();
      if(r.right>W-10) tt.style.left=(e.clientX-r.width-18)+'px';
      if(r.bottom>H-10) tt.style.top=(e.clientY-r.height)+'px';
    });
    document.body.style.cursor='pointer';
  } else {
    tt.style.opacity='0';
    document.body.style.cursor='default';
  }
});

document.addEventListener('click', e=>{
  if(document.getElementById('drill').classList.contains('open')) return;
  const lobe = getLobe(e.clientX, e.clientY);
  if(lobe) openDrill(lobe);
});

// ═══════════════════════════════════════════════════════════════════════
// DRILL-DOWN
// ═══════════════════════════════════════════════════════════════════════
function openDrill(lobe){
  const d = lobe.detail;
  document.getElementById('d-title').textContent = d.title;
  document.getElementById('drill-sub').textContent = d.anatomy;
  document.getElementById('tooltip').style.opacity='0';

  document.getElementById('drill-info').innerHTML = `
    <div class="di-section">
      <div class="di-label">Descrição</div>
      <div class="di-value">${d.desc}</div>
    </div>
    <div class="di-section">
      <div class="di-label">Componentes</div>
      <div>${d.tags.map(t=>`<span class="di-tag">${t}</span>`).join('')}</div>
    </div>
    <div class="di-section">
      <div class="di-label">Métricas</div>
      ${d.metrics.map(m=>`<div class="di-metric"><span>${m.k}</span><span>${m.v}</span></div>`).join('')}
    </div>
  `;

  document.getElementById('drill').classList.add('open');
  drawDrillCanvas(d);
}

function closeDrill(){
  document.getElementById('drill').classList.remove('open');
}

function drawDrillCanvas(d){
  const dc = document.getElementById('drill-canvas');
  const dctx = dc.getContext('2d');
  const W2=dc.width, H2=dc.height;

  const dnodes = d.nodes.map((name,i)=>{
    const angle = (i/d.nodes.length)*Math.PI*2 - Math.PI/2;
    const r = W2*0.33;
    return {x:W2/2+Math.cos(angle)*r, y:H2/2+Math.sin(angle)*r,
            ox:W2/2+Math.cos(angle)*r, oy:H2/2+Math.sin(angle)*r,
            name, phase:Math.random()*Math.PI*2};
  });
  const center = {x:W2/2, y:H2/2, name:d.title};

  let dSparks=[], dLastSpark=0, dActive=true;

  class DS {
    constructor(a,b){ this.a=a; this.b=b; this.t=0; this.spd=0.014+Math.random()*0.018; this.alive=true; }
    update(){ this.t+=this.spd; if(this.t>=1)this.alive=false; }
    draw(){
      const px2=this.a.x+(this.b.x-this.a.x)*this.t;
      const py2=this.a.y+(this.b.y-this.a.y)*this.t;
      const al=Math.sin(this.t*Math.PI);
      dctx.beginPath(); dctx.moveTo(this.a.x,this.a.y); dctx.lineTo(px2,py2);
      dctx.strokeStyle=`rgba(220,238,255,${al*0.55})`; dctx.lineWidth=0.8*al; dctx.stroke();
      dctx.beginPath(); dctx.arc(px2,py2,1.8*al,0,Math.PI*2);
      dctx.fillStyle=`rgba(235,246,255,${al*0.80})`; dctx.fill();
    }
  }

  function drillLoop(ts){
    if(!dActive) return;
    if(!document.getElementById('drill').classList.contains('open')){ dActive=false; return; }
    requestAnimationFrame(drillLoop);
    dctx.clearRect(0,0,W2,H2);

    const t2=ts*0.001;
    dnodes.forEach((n,i)=>{
      n.x=n.ox+Math.cos(t2*0.4+i)*5;
      n.y=n.oy+Math.sin(t2*0.3+i)*5;
      dctx.beginPath(); dctx.moveTo(center.x,center.y); dctx.lineTo(n.x,n.y);
      dctx.strokeStyle='rgba(200,220,255,0.06)'; dctx.lineWidth=0.5; dctx.stroke();
    });

    dnodes.forEach(n=>{
      const pulse=0.7+Math.sin(ts*0.003+n.phase)*0.3;
      const g=dctx.createRadialGradient(n.x,n.y,0,n.x,n.y,18);
      g.addColorStop(0,`rgba(215,232,255,${0.10*pulse})`); g.addColorStop(1,'transparent');
      dctx.beginPath(); dctx.arc(n.x,n.y,18,0,Math.PI*2); dctx.fillStyle=g; dctx.fill();
      dctx.beginPath(); dctx.arc(n.x,n.y,2.5,0,Math.PI*2);
      dctx.fillStyle=`rgba(230,244,255,${0.75*pulse})`; dctx.fill();
      dctx.font='7px Courier New'; dctx.fillStyle='rgba(200,220,255,0.40)';
      dctx.textAlign='center'; dctx.fillText(n.name,n.x,n.y+14);
    });

    const cp=0.7+Math.sin(ts*0.004)*0.3;
    const cg=dctx.createRadialGradient(center.x,center.y,0,center.x,center.y,28);
    cg.addColorStop(0,`rgba(215,232,255,${0.18*cp})`); cg.addColorStop(1,'transparent');
    dctx.beginPath(); dctx.arc(center.x,center.y,28,0,Math.PI*2); dctx.fillStyle=cg; dctx.fill();
    dctx.beginPath(); dctx.arc(center.x,center.y,4,0,Math.PI*2);
    dctx.fillStyle=`rgba(240,250,255,${0.90*cp})`; dctx.fill();
    dctx.font='8px Courier New'; dctx.fillStyle='rgba(200,220,255,0.50)';
    dctx.textAlign='center'; dctx.fillText(d.title,center.x,center.y+20);

    if(ts-dLastSpark>80 && dSparks.length<20 && Math.random()<0.7){
      const n=dnodes[Math.floor(Math.random()*dnodes.length)];
      dSparks.push(new DS(center,n)); dLastSpark=ts;
      if(Math.random()<0.3){
        const a=dnodes[Math.floor(Math.random()*dnodes.length)];
        const b=dnodes[Math.floor(Math.random()*dnodes.length)];
        if(a!==b) dSparks.push(new DS(a,b));
      }
    }
    dSparks=dSparks.filter(s=>s.alive);
    dSparks.forEach(s=>{ s.update(); s.draw(); });
  }
  requestAnimationFrame(drillLoop);
}

// ═══════════════════════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════════════════════
window.addEventListener('resize',()=>{
  W=window.innerWidth; H=window.innerHeight;
  ovC.width=W; ovC.height=H;
  buildScene(); initNodes();
});

// ═══════════════════════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════════════════════
buildScene();
initNodes();
loop(0);
</script>
</body>
